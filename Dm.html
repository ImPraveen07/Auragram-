<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>Auragram | Direct Messages</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-tap-highlight-color:transparent}
        body{background:#0b0a10;color:#fff;overflow-x:hidden;position:relative;min-height:100dvh;}
        ::-webkit-scrollbar{display:none}
        
        @media (min-width: 500px) {
            body { max-width: 450px; border-left: 1px solid #262626; border-right: 1px solid #262626; margin: 0 auto; }
            nav, .b-bar, .full-view { width: 450px !important; left: calc(50% - 225px) !important; }
        }

        nav{height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 15px;position:sticky;top:0;background:#0b0a10;z-index:1000;}
        .nav-c{display:flex;align-items:center;gap:5px;position:absolute;left:50%;transform:translateX(-50%); font-size:16px; font-weight:700;}
        .nav-icon{width:24px;filter:invert(1);cursor:pointer;}
        
        .u-row{display:flex;align-items:center;padding:10px 0;cursor:pointer;transition:background 0.2s; justify-content:space-between;}
        .u-row:active{opacity: 0.7;}
        .u-row img.pfp{width:56px;height:56px;border-radius:50%;object-fit:cover;margin-right:12px;background:#121212; flex-shrink:0;}
        .u-meta{flex:1; overflow:hidden;}
        .u-meta b{font-size:14.5px;display:block;}
        .u-meta span{font-size:14px; display:flex; margin-top:2px; white-space:nowrap;}
        .msg-preview-text {overflow:hidden; text-overflow:ellipsis; max-width: 65%;}
        
        .b-blue-indigo{background:#4b6afa;color:#fff;border:none;padding:7px 18px;border-radius:8px;font-weight:600;font-size:13.5px;cursor:pointer;}

        .notes-scroll{display:flex; gap:18px; overflow-x:auto; padding:10px 0 20px 0;}
        .note-item{text-align:center; width:72px; cursor:pointer; flex-shrink: 0;}
        .note-pfp-container{position:relative; margin-bottom:5px; width:72px; height:72px;}
        .note-pfp{width:100%; height:100%; border-radius:50%; object-fit:cover; opacity:0.8;}
        .note-bubble{position:absolute; top:-15px; left:50%; transform:translateX(-50%); background:#262626; padding:8px 12px; border-radius:16px; font-size:11.5px; color:#fff; white-space:nowrap; max-width: 90px; overflow:hidden; text-overflow:ellipsis;}
        .add-note-badge { position:absolute; bottom:0; right:0; background:#262626; color:#fff; border-radius:50%; width:22px; height:22px; display:flex; align-items:center; justify-content:center; font-size:16px; font-weight:bold; border:2px solid #0b0a10;}
        
        #create-note-view { background: #0b0a10; display: flex; flex-direction: column; justify-content: space-between; z-index: 9000; }
        .note-edit-area { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; position:relative; margin-top:-50px; }
        .note-input-bubble { background:#262626; color:#fff; border:none; outline:none; border-radius:24px; padding:15px 20px; font-size:16px; text-align:center; width:160px; height:70px; resize:none; margin-bottom:15px; font-family:inherit;}
        
        .search-bar {background:#262626; border-radius:20px; display:flex; align-items:center; padding:10px 15px; margin-bottom:20px;}
        .search-bar input {background:transparent; border:none; color:#fff; outline:none; font-size:15px; flex:1;}
        .search-bar img {width:16px; filter:invert(0.6); margin-right:10px;}

        .full-view { position:fixed; top:0; left:0; width:100vw; height:100dvh; background:#000; z-index:7500; flex-direction:column; }
        .e-nav{height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 15px;background:#000;}
        
        .msg-body { flex:1; overflow-y:auto; overflow-x:hidden; padding:0 15px 15px 15px; display:flex; flex-direction:column; gap:4px; position:relative; }
        .chat-profile-card { text-align: center; padding: 40px 15px 30px; display: flex; flex-direction: column; align-items: center; }
        .chat-profile-card img { width: 110px; height: 110px; border-radius: 50%; object-fit: cover; margin-bottom: 15px; }
        .chat-profile-card h2 { font-size: 20px; font-weight: 700; margin-bottom: 2px; }
        .chat-profile-card .uname { font-size: 15px; font-weight: 600; display: block; margin-bottom: 6px; }
        .chat-profile-card .stats { font-size: 13.5px; color: #a8a8a8; display: block; margin-bottom: 5px; }
        .chat-profile-card .rel { font-size: 13.5px; color: #a8a8a8; display: block; margin-bottom: 18px; }
        .chat-profile-card button { background: #262626; color: #fff; border: none; padding: 8px 16px; border-radius: 8px; font-weight: 600; font-size: 14px; cursor: pointer; }

        .time-divider { text-align:center; font-size:11.5px; color:#888; margin: 18px 0 14px; font-weight:500; }

        .msg-row-wrapper { position: relative; width: 100%; margin-bottom: 2px; }
        .msg-row-inner { width: 100%; display: flex; align-items: flex-end; transition: transform 0.2s ease-out; }
        
        .msg-bubble { max-width:75%; padding:10px 15px; font-size:15px; line-height:1.4; word-wrap:break-word; border-radius: 22px; position:relative; }
        .msg-sent { background:#7b30f5; color:#fff; border-bottom-right-radius:4px; margin-left:auto; }
        .msg-recv { background:#262626; color:#fff; border-bottom-left-radius:4px; }
        
        .msg-img-bubble { background:transparent !important; padding:0 !important; border-radius:18px !important; overflow:hidden;}
        .msg-img-bubble img { max-width:240px; border-radius:18px; display:block; object-fit:cover; cursor:pointer;}
        
        .msg-recv-pfp { width:28px; height:28px; border-radius:50%; object-fit:cover; margin-right:8px; flex-shrink:0; align-self:flex-end; }
        .msg-exact-time { position: absolute; right: -50px; top: 50%; transform: translateY(-50%); font-size: 11px; color: #888; opacity: 0; transition: opacity 0.2s; white-space:nowrap; }

        .swipe-active .msg-row-inner { transform: translateX(-60px); }
        .swipe-active .msg-exact-time { opacity: 1; right: 10px; }

        .msg-audio-bubble { width: 270px; padding: 10px 14px !important; display: flex; flex-direction: column; background: #6c40ff !important; border-radius: 22px; }
        .msg-recv.msg-audio-bubble { background: #262626 !important; }
        .audio-main-row { display: flex; align-items: center; gap: 8px; width: 100%; }
        .audio-play-btn { width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0;}
        .audio-waveform-track { flex: 1; height: 26px; display: flex; align-items: center; cursor: pointer; justify-content: space-between; padding: 0 4px; }
        .wave-bar { width: 2.5px; border-radius: 1.5px; background: rgba(255,255,255,0.4); transition: background 0.1s; }
        .audio-right-controls { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; flex-shrink: 0; width:30px; }
        .audio-time-text { font-size: 11px; font-weight: 500; color: #fff; }
        .audio-speed-btn { font-size: 10px; font-weight: 800; cursor: pointer; color: #fff; background: rgba(0,0,0,0.2); padding: 2px 6px; border-radius: 10px;}
        .audio-transcription { font-size: 13px; color: #fff; margin-top: 8px; opacity: 0.85; font-weight: 500; margin-left: 42px;}

        /* EXACT INSTA INPUT PILL STYLES */
        .msg-input-area { padding:10px 15px 15px; background:#000; position:relative; }
        .msg-input-pill { background: #262626; border-radius: 30px; display: flex; align-items: center; padding: 4px; gap: 10px; width: 100%; height: 48px; }
        
        .pill-left-action { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; cursor: pointer; }
        #pill-left-cam { background: #4b6afa; }
        #pill-left-search { background: #fff; display: none; }
        
        .msg-input-pill input { flex: 1; background: transparent; border: none; color: #fff; outline: none; font-size: 15.5px; padding: 0 5px; }
        .msg-input-pill input::placeholder { color:#888; }
        
        .pill-right-actions { display: flex; align-items: center; gap: 15px; padding-right: 12px; }
        .pill-right-actions svg { cursor: pointer; color: #fff; opacity: 0.8; transition: opacity 0.2s;}
        .pill-right-actions svg:active { opacity: 0.5;}
        
        #pill-right-send { display: none; padding-right: 0; }
        .send-btn-circle { width: 40px; height: 40px; border-radius: 50%; background: #7b30f5; display: flex; align-items: center; justify-content: center; cursor: pointer; margin-right: 4px; }

        #msg-input-recording { display:none; flex-direction:column; width:100%; gap:10px; }
        .rec-bubble { background: #6c40ff; border-radius: 24px; display: flex; align-items: center; padding: 0 15px; gap: 15px; width: 100%; height: 48px; }
        .rec-stop-btn { width: 14px; height: 14px; background: #fff; border-radius: 2px; cursor: pointer; }
        .rec-wave-dots { flex: 1; display: flex; align-items: center; gap: 6px; overflow: hidden; justify-content:center; }
        .rec-dot { width: 4px; height: 4px; background: rgba(255,255,255,0.4); border-radius: 50%; }
        .rec-dot.active { background: #fff; animation: pop 1s infinite alternate; }
        @keyframes pop { 0% {transform: scale(1);} 100% {transform: scale(1.5);} }
        .rec-timer { color: #fff; font-size: 14px; font-weight: 500; font-variant-numeric: tabular-nums; }
        .rec-bot-row { display: flex; justify-content: space-between; align-items: center; width: 100%; padding: 0 5px; }
        .rec-trash { cursor: pointer; }
        .rec-center { display: flex; align-items: center; gap: 8px; color: #fff; font-size: 14px; font-weight: 600; }
        .rec-send { width: 36px; height: 36px; border-radius: 50%; background: #4b6afa; display: flex; align-items: center; justify-content: center; cursor: pointer; }

        .b-bar{position:fixed;bottom:0;width:100%;height:46px;background:#0b0a10;border-top:.1px solid #262626;display:flex;justify-content:space-around;align-items:center;z-index:1000}
        .b-bar img{width:24px;filter:invert(1);cursor:pointer}
        .b-pfp{width:26px;height:26px;border-radius:50%;object-fit:cover;cursor:pointer;border:1.5px solid transparent;}
        
        .cam-icon-right { width:26px; height:26px; object-fit:contain; filter:invert(0.6); cursor:pointer; flex-shrink:0; margin-left:10px;}
        .unread-dot { width:8px; height:8px; border-radius:50%; background:#4b6afa; flex-shrink:0; margin-left:14px; margin-right:4px;}

        /* --- INSTAGRAM GIF PICKER STYLES --- */
        #gif-overlay {
            position: absolute; bottom: 0; left: 0; width: 100%; background: #262626;
            border-top-left-radius: 16px; border-top-right-radius: 16px;
            display: flex; flex-direction: column; transition: height 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            z-index: 8500; height: 0; overflow: hidden;
        }
        #gif-overlay.half { height: 380px; }
        #gif-overlay.full { height: calc(100vh - 54px); } /* Fills screen just under top nav */

        .gif-drag-area { width: 100%; padding: 12px 0; cursor: pointer; }
        .gif-drag-handle { width: 36px; height: 4px; background: #555; border-radius: 4px; margin: 0 auto; }
        
        .gif-search-wrap { padding: 0 16px 12px; }
        .gif-search-box {
            position: relative; background: #363636; border-radius: 8px; display: flex; align-items: center; padding: 8px 12px;
        }
        .gif-search-box svg { width: 16px; height: 16px; stroke: #8e8e8e; margin-right: 8px; flex-shrink:0; }
        .gif-search-box input { background: transparent; border: none; color: white; font-size: 15px; width: 100%; outline: none; }
        .gif-clear-icon { stroke: #8e8e8e; stroke-width: 2; cursor: pointer; display: none; margin-left: 8px; }

        .gif-categories {
            display: flex; justify-content: space-between; padding: 0 16px; border-bottom: 1px solid #363636;
            overflow: hidden; transition: max-height 0.2s ease, opacity 0.2s ease; max-height: 50px; opacity: 1; flex-shrink: 0;
        }
        .gif-categories.hidden { max-height: 0; opacity: 0; border-bottom: none; }
        .gif-cat-icon { width: 100%; display: flex; justify-content: center; padding-bottom: 12px; cursor: pointer; border-bottom: 2px solid transparent; color: #8e8e8e; }
        .gif-cat-icon svg { width: 20px; height: 20px; stroke-width: 2px; }
        .gif-cat-icon.active { color: #fff; border-bottom: 2px solid #fff; }

        .gif-scroll-area { flex: 1; overflow-y: auto; padding: 8px; }
        .gif-grid { display: flex; gap: 8px; align-items: flex-start; }
        .gif-col { display: flex; flex-direction: column; flex: 1; gap: 8px; }
        .gif-item-box { border-radius: 6px; background: #363636; position: relative; display: flex; justify-content: center; align-items: center; overflow: hidden; cursor: pointer; width: 100%; }
        .gif-item-loader { position: absolute; width: 20px; height: 20px; border: 2px solid transparent; border-top: 2px solid #8e8e8e; border-left: 2px solid #8e8e8e; border-radius: 50%; animation: spin 0.8s linear infinite; }
        .gif-item-img { width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 0.2s ease-in; position: relative; z-index: 2; }
        .gif-item-box:active { transform: scale(0.96); }

        #gif-api-loader { display: none; text-align: center; padding: 20px; }
        .gif-spinner { width: 24px; height: 24px; border: 2px solid #363636; border-top: 2px solid #8e8e8e; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto; }
        #gif-msg-box { text-align: center; color: #8e8e8e; padding-top: 20px; font-size: 14px; }
        /* --- END GIF STYLES --- */

        /* FULL OVERLAYS (Cam, Calls, ImageViewer) */
        #img-viewer-ov { display:none; position:fixed; top:0; left:0; width:100vw; height:100dvh; background:#000; z-index:9999; flex-direction:column; }
        .iv-top { padding:20px; display:flex; justify-content:space-between; align-items:center; }
        .iv-bot { padding:20px; display:flex; justify-content:flex-end; align-items:center; }
        .iv-img-wrap { flex:1; display:flex; align-items:center; justify-content:center; overflow:hidden; }
        .iv-img-wrap img { max-width:100%; max-height:100%; object-fit:contain; }
        #loading-toast { position:fixed; top:50px; left:50%; transform:translateX(-50%); background:#333; color:#fff; padding:8px 16px; border-radius:20px; font-size:12px; z-index:9999; display:none; }

        #live-cam-ov { display:none; position:fixed; top:0; left:0; width:100vw; height:100dvh; background:#000; z-index:9999; flex-direction:column; }
        .live-cam-top { position:absolute; top:20px; left:20px; right:20px; display:flex; justify-content:space-between; z-index:10000; }
        .live-cam-controls { position:absolute; bottom:50px; left:0; width:100%; display:flex; justify-content:center; align-items:center; gap:50px; z-index:10000; }
        .capture-btn { width:70px; height:70px; border-radius:50%; border:4px solid #fff; background:rgba(255,255,255,0.3); cursor:pointer; }
        .capture-btn:active { background:#fff; }
        .cam-switch-btn { width:40px; height:40px; background:rgba(0,0,0,0.5); border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; }

        #call-ov { display:none; position:fixed; top:0; left:0; width:100vw; height:100dvh; background:#1c1c1e; z-index:10000; flex-direction:column; overflow:hidden;}
        #call-remote-video { position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; z-index:1; }
        #call-local-video { position:absolute; top:20px; right:20px; width:100px; height:150px; object-fit:cover; border-radius:12px; z-index:2; background:#000; display:none; }
        .call-info { position:absolute; top:60px; left:0; width:100%; display:flex; flex-direction:column; align-items:center; z-index:3; text-align:center; text-shadow:0 2px 5px rgba(0,0,0,0.5); }
        .call-pfp-large { width:100px; height:100px; border-radius:50%; object-fit:cover; margin-bottom:15px; box-shadow:0 4px 10px rgba(0,0,0,0.3); }
        .call-controls { position:absolute; bottom:50px; left:0; width:100%; display:flex; justify-content:center; gap:25px; z-index:3; }
        .c-btn { width:60px; height:60px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; background:rgba(255,255,255,0.2); backdrop-filter:blur(10px); }
        .c-btn-red { background:#ff3b30; }

        #incoming-call-modal { display:none; position:fixed; top:20px; left:50%; transform:translateX(-50%); width:90%; max-width:400px; background:#262626; border-radius:20px; padding:15px; z-index:10001; align-items:center; gap:15px; box-shadow:0 10px 25px rgba(0,0,0,0.5); animation: slideDown 0.3s ease-out; }
        @keyframes slideDown { from{top:-100px;} to{top:20px;} }
        .inc-btns { display:flex; gap:10px; margin-left:auto; }
        .inc-btn { width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; }
    </style>
</head>
<body>

    <div id="loading-toast">Sending...</div>
    <input type="file" accept="image/*" id="chat-gallery-input" style="display:none;" onchange="handleChatGalleryUpload(event)">

    <div id="incoming-call-modal">
        <img id="inc-call-pfp" src="" style="width:50px; height:50px; border-radius:50%; object-fit:cover;">
        <div>
            <b id="inc-call-name" style="font-size:15px; display:block;">User</b>
            <span id="inc-call-type" style="font-size:13px; color:#a8a8a8;">Incoming video call...</span>
        </div>
        <div class="inc-btns">
            <div class="inc-btn c-btn-red" onclick="rejectCall()">
                <svg fill="white" width="20" height="20" viewBox="0 0 24 24"><path d="M12 9c-1.6 0-3.15.25-4.6.72v3.1c0 .39-.23.74-.56.9-1.02.48-1.95 1.12-2.76 1.88-.23.23-.62.23-.85 0l-2.03-2.03c-.23-.23-.23-.62 0-.85C4.24 9.5 7.9 7.5 12 7.5s7.76 2 10.8 5.22c.23.23.23.62 0 .85l-2.03 2.03c-.23.23-.62.23-.85 0-.81-.76-1.74-1.4-2.76-1.88-.33-.16-.56-.51-.56-.9v-3.1C15.15 9.25 13.6 9 12 9z"/></svg>
            </div>
            <div class="inc-btn" style="background:#34c759;" onclick="acceptCall()">
                <svg fill="white" width="20" height="20" viewBox="0 0 24 24"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
            </div>
        </div>
    </div>

    <div id="main-dm-view">
        <nav>
            <img src="https://cdn-icons-png.flaticon.com/512/271/271218.png" style="width:20px; filter:invert(1); cursor:pointer;" onclick="goBack()">
            <div class="nav-c">
                <b id="h-uid">Loading...</b> 
                <span style="font-size: 10px; margin-left:3px; color:#ed4956;">▼</span>
            </div>
            <img src="https://cdn-icons-png.flaticon.com/512/1159/1159633.png" class="nav-icon" onclick="openNewMessageMenu()">
        </nav>

        <div style="padding: 10px 15px 70px 15px;">
            <div class="search-bar">
                <img src="https://cdn-icons-png.flaticon.com/512/54/54481.png">
                <input type="text" placeholder="Search or ask Meta AI">
            </div>

            <div class="notes-scroll" id="notes-container"></div>

            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 5px; margin-bottom: 12px;">
                <b style="font-size: 16px;">Messages</b>
                <span style="color: #4b6afa; font-weight: 600; font-size: 15px; cursor:pointer;">Requests</span>
            </div>
            
            <div id="active-chats-list"><p style="color:#a8a8a8; font-size:13px; text-align:center; padding: 20px 0;">Loading chats...</p></div>
            <p id="empty-state" style="display:none; margin-bottom:20px;">Chats will appear here after you send or receive a message.</p>

            <div style="display: flex; justify-content: space-between; align-items: center; margin: 30px 0 15px 0;">
                <b style="font-size: 15.5px;">Accounts to follow</b>
                <span style="color: #4b6afa; font-size: 14px; font-weight: 600; cursor:pointer;">See all</span>
            </div>
            <div id="suggestion-list"></div>
        </div>
    </div>

    <div id="new-msg-overlay" class="full-view" style="display: none;">
        <div class="e-nav" style="border-bottom:none;">
            <div style="display:flex; align-items:center;">
                <img src="https://cdn-icons-png.flaticon.com/512/271/271218.png" style="width:20px; filter:invert(1); cursor:pointer;" onclick="closeNewMessageMenu()">
                <b style="font-size: 18px; margin-left:25px;">New message</b>
            </div>
        </div>
        <div style="padding: 10px 15px; display: flex; align-items: center; border-bottom: 0.1px solid #262626;">
            <span style="font-weight: 600; margin-right: 15px; color:#a8a8a8;">To:</span>
            <input type="text" id="search-users-input" placeholder="Search" style="background:transparent; border:none; color:#fff; outline:none; flex:1; font-size:15px;">
        </div>
        <div style="padding: 15px; overflow-y:auto; flex:1;">
            <div id="follower-suggestion-list"></div>
        </div>
    </div>

    <div id="msg-view" class="full-view" style="z-index: 8000; display: none;">
        <div class="e-nav">
            <div style="display:flex; align-items:center;">
                <img src="https://cdn-icons-png.flaticon.com/512/271/271218.png" style="width:22px; filter:invert(1); cursor:pointer;" onclick="closeMsg()">
                <div style="display:flex; align-items:center; margin-left:20px; cursor:pointer;" onclick="location.href='profile.html?u='+activeChatUser">
                    <img id="chat-pfp" src="" style="width:34px; height:34px; border-radius:50%; object-fit:cover; margin-right:12px;">
                    <div>
                        <b id="chat-uid" style="font-size:16px; display:block;"></b>
                        <span style="font-size:12px; color:#a8a8a8;">Auragram</span>
                    </div>
                </div>
            </div>

        function goBack() { window.history.back(); }

        function hideLoading() { document.getElementById('loading-toast').style.display = 'none'; }

        /* ================================
           GIF ENGINE (KLIPY INTEGRATION) 
           ================================ */
        const gifOverlay = document.getElementById('gif-overlay');
        const gifSearchInput = document.getElementById('gifSearchInput');
        const gifClearBtn = document.getElementById('gifClearBtn');
        const gifCategoriesBox = document.getElementById('gifCategoriesBox');
        const gifCol1 = document.getElementById('gifCol1');
        const gifCol2 = document.getElementById('gifCol2');
        const gifMessageBox = document.getElementById('gif-msg-box');
        const gifLoader = document.getElementById('gif-api-loader');
        const gifScrollArea = document.getElementById('gifScrollArea');

        const KLIPY_KEY = "9kgwujswREy0l8wCtJs0CqJHsWJoRWUv2ush8lNXsQp6TN5oiJFIfFDMW2vG7vVJ"; 
        const GIF_BASE_URL = "https://api.klipy.com/v2"; 
        
        let gifTypingTimer;
        let gifOffset = '';
        let gifQuery = '';
        let gifIsTrending = true;
        let gifIsFetching = false;
        const GIF_LIMIT = 20;

        function toggleGifPicker() {
            if (gifOverlay.classList.contains('half') || gifOverlay.classList.contains('full')) {
                gifOverlay.className = ''; // Hide
            } else {
                gifOverlay.className = 'half'; // Show half
                setTimeout(() => { msgList.scrollTop = msgList.scrollHeight; }, 300);
            }
        }

        function shrinkGifPicker() {
            if (gifOverlay.classList.contains('full')) {
                resetGifSearch(); // Slide back to half
            } else {
                gifOverlay.className = ''; // Close entirely if already half
            }
        }

        // Expand to full when searching
        gifSearchInput.addEventListener('focus', () => {
            gifOverlay.className = 'full';
            gifCategoriesBox.classList.add('hidden');
        });

        gifSearchInput.addEventListener('input', () => {
            clearTimeout(gifTypingTimer);
            const query = gifSearchInput.value.trim();
            gifClearBtn.style.display = query.length > 0 ? 'block' : 'none';

            gifTypingTimer = setTimeout(() => {
                if (query) fetchGIFs(query, false, false);
                else fetchGIFs('', true, false);
            }, 400); 
        });

        function resetGifSearch() {
            gifSearchInput.value = '';
            gifClearBtn.style.display = 'none';
            gifCategoriesBox.classList.remove('hidden');
            gifSearchInput.blur(); 
            document.querySelectorAll('.gif-cat-icon').forEach(i => i.classList.remove('active'));
            document.getElementById('gifDefaultTrend').classList.add('active');
            gifOverlay.className = 'half';
            fetchGIFs('', true, false);
        }

        function changeGifCategory(type, el) {
            document.querySelectorAll('.gif-cat-icon').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            gifSearchInput.value = ""; 
            gifClearBtn.style.display = 'none';
            
            if(type === 'trending') fetchGIFs('', true, false);
            else fetchGIFs(type, false, false); 
        }

        gifScrollArea.addEventListener('scroll', () => {
            if (gifScrollArea.scrollTop + gifScrollArea.clientHeight >= gifScrollArea.scrollHeight - 100) {
                if (!gifIsFetching && gifOffset) {
                    fetchGIFs(gifQuery, gifIsTrending, true); 
                }
            }
        });

        async function fetchGIFs(query, isTrending, append = false) {
            if (gifIsFetching) return;
            gifIsFetching = true;
            gifMessageBox.innerHTML = ''; 
            
            if (!append) gifOffset = '';

            gifQuery = query;
            gifIsTrending = isTrending;

            const endpoint = isTrending ? 'featured' : 'search';
            const finalQuery = (query === 'recent' || query === 'favorites') ? 'trending' : query;
            
            let url = `${GIF_BASE_URL}/${endpoint}?key=${KLIPY_KEY}&limit=${GIF_LIMIT}&per_page=${GIF_LIMIT}`;
            
            if (!isTrending) url += `&q=${encodeURIComponent(finalQuery)}`;
            if (append && gifOffset) url += `&pos=${gifOffset}`;

            const cachedData = sessionStorage.getItem(url);
            
            if (cachedData) {
                if (!append) { gifCol1.innerHTML = ''; gifCol2.innerHTML = ''; }
                const parsedData = JSON.parse(cachedData);
                renderGIFs(parsedData.results, append);
                gifOffset = parsedData.next || ''; 
                gifIsFetching = false;
                gifLoader.style.display = 'none';
                return; 
            }

            if (!append) { gifLoader.style.display = 'block'; gifCol1.innerHTML = ''; gifCol2.innerHTML = ''; }

            try {
                const response = await fetch(url);
                const json = await response.json();
                
                const results = json.results || [];
                gifOffset = json.next || '';
                
                sessionStorage.setItem(url, JSON.stringify({ results: results, next: json.next }));
                renderGIFs(results, append);
                
                if (results.length === 0 && !append) gifMessageBox.innerHTML = 'No GIFs found.';

            } catch (err) {
                console.error("Klipy Error:", err);
                if (!append) gifMessageBox.innerHTML = '<span style="color:#ff6b6b;">Network Error.</span>';
            } finally {
                gifLoader.style.display = 'none';
                gifIsFetching = false;
            }
        }

        function renderGIFs(data, append) {
            let newCol1Html = ''; let newCol2Html = '';

            data.forEach((gif, index) => {
                const media = gif.media_formats?.tinygif || gif.media_formats?.gif || gif.files?.tinygif || gif.files?.gif || gif.media?.[0]?.tinygif;
                const width = media?.dims?.[0] || 200;
                const height = media?.dims?.[1] || 200;
                const imgUrl = media?.url || '';

                if (!imgUrl) return;

                const loadStrategy = (index < 6 && !append) ? 'loading="eager"' : 'loading="lazy"';
                const html = `
                    <div class="gif-item-box" style="aspect-ratio: ${width} / ${height};" onclick="sendGifUrl('${imgUrl}')">
                        <div class="gif-item-loader"></div>
                        <img src="${imgUrl}" class="gif-item-img" ${loadStrategy} onload="this.style.opacity=1; this.previousElementSibling.style.display='none'">
                    </div>
                `;

                if (index % 2 === 0) newCol1Html += html;
                else newCol2Html += html;
            });

            if (append) { gifCol1.innerHTML += newCol1Html; gifCol2.innerHTML += newCol2Html; } 
            else { gifCol1.innerHTML = newCol1Html; gifCol2.innerHTML = newCol2Html; }
        }

        async function sendGifUrl(gifUrl) {
            if(!activeChatUser) return;
            gifOverlay.className = ''; // close sheet instantly
            showLoading("Sending...");
            const chatId = getChatId(LOG, activeChatUser);
            await db.collection("chats").doc(chatId).collection("messages").add({
                sender: LOG, text: "", gifUrl: gifUrl, read: false, timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            hideLoading();
            loadActiveChatsList(); 
        }

        /* ================================
           CALLS & CAMERA ENGINE 
           ================================ */
        async function openLiveCamera(targetUid) {
            if(event) event.stopPropagation();
            liveCamTarget = targetUid;
            document.getElementById("live-cam-ov").style.display = "flex";
            if(liveCamStream) { liveCamStream.getTracks().forEach(t => t.stop()); }
            const constraints = { video: { facingMode: usingFrontCamera ? "user" : "environment" }, audio: false };
            try {
                liveCamStream = await navigator.mediaDevices.getUserMedia(constraints);
                document.getElementById('live-cam-video').srcObject = liveCamStream;
            } catch(e) {
                alert("Camera access denied or unavailable.");
                closeLiveCamera();
            }
        }

        function flipLiveCamera() { usingFrontCamera = !usingFrontCamera; openLiveCamera(liveCamTarget); }

        function closeLiveCamera() {
            if(liveCamStream) { liveCamStream.getTracks().forEach(t => t.stop()); liveCamStream = null; }
            document.getElementById("live-cam-ov").style.display = "none";
            liveCamTarget = null;
        }

        async function captureLivePhoto() {
            if(!liveCamStream || !liveCamTarget) return;
            const video = document.getElementById('live-cam-video');
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            const base64Img = canvas.toDataURL('image/jpeg', 0.7);
            closeLiveCamera();
            showLoading("Sending...");
            
            const chatId = getChatId(LOG, liveCamTarget);
            await db.collection("chats").doc(chatId).collection("messages").add({
                sender: LOG, text: "", image: base64Img, read: false, timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            hideLoading();
            loadActiveChatsList();
        }

        function listenForIncomingCalls() {
            db.collection("calls").where("receiver", "==", LOG).where("status", "==", "ringing").onSnapshot(snap => {
                snap.docChanges().forEach(async change => {
                    if (change.type === "added") {
                        const callData = change.doc.data();
                        currentCallId = change.doc.id;
                        isVideoCall = callData.type === 'video';
                        const callerDoc = await db.collection("users").doc(callData.caller).get();
                        const pfp = callerDoc.exists && callerDoc.data().profileImg ? callerDoc.data().profileImg : DIMG;
                        document.getElementById("inc-call-pfp").src = pfp;
                        document.getElementById("inc-call-name").innerText = callData.caller;
                        document.getElementById("inc-call-type").innerText = isVideoCall ? "Incoming video call..." : "Incoming audio call...";
                        document.getElementById("incoming-call-modal").style.display = "flex";
                    }
                    if (change.type === "modified" && (change.doc.data().status === "ended" || change.doc.data().status === "rejected")) {
                        document.getElementById("incoming-call-modal").style.display = "none";
                        currentCallId = null;
                    }
                });
            });
        }

        window.startCall = async function(type) {
            if(!activeChatUser) return;
            const retUrl = encodeURIComponent(window.location.href);
            const callRef = db.collection("calls").doc();
            await callRef.set({ caller: LOG, receiver: activeChatUser, type: type, status: 'ringing', timestamp: Date.now() });
            window.location.href = `${FIREBASE_HOST}?callId=${callRef.id}&returnUrl=${retUrl}&isCaller=true`;
        }
        window.acceptCall = function() {
            if(!currentCallId) return;
            const retUrl = encodeURIComponent(window.location.href);
            window.location.href = `${FIREBASE_HOST}?callId=${currentCallId}&returnUrl=${retUrl}&isCaller=false`;
        }
        window.rejectCall = async function() {
            document.getElementById("incoming-call-modal").style.display = "none";
            if(currentCallId) { await db.collection("calls").doc(currentCallId).update({ status: 'rejected' }); currentCallId = null; }
        }

        /* ================================
           CORE CHAT LOGIC 
           ================================ */
        function getChatId(u1, u2) { return u1 < u2 ? u1 + "_" + u2 : u2 + "_" + u1; }

        async function loadNotes() {
            const container = document.getElementById("notes-container");
            container.innerHTML = "";
            const myDoc = await db.collection("users").doc(LOG).get();
            const myData = myDoc.data();
            
            const following = myData.followingList || [];
            const followers = myData.followerList || [];
            const mutuals = following.filter(uid => followers.includes(uid) && uid !== LOG);

            for(let uid of mutuals) {
                const uDoc = await db.collection("users").doc(uid).get();
                const uData = uDoc.data();
                if(uData.note && uData.note.text) {
                    container.innerHTML += `
                        <div class="note-item" onclick="openMsg('${uid}', '${uData.profileImg || DIMG}')">
                            <div class="note-pfp-container">
                                <img src="${uData.profileImg || DIMG}" class="note-pfp" style="opacity:1;">
                                <div class="note-bubble">${uData.note.text}</div>
                            </div>
                            <span style="font-size:12px;">${uid.length > 9 ? uid.substring(0,8)+'...' : uid}</span>
                        </div>
                    `;
                }
            }
        }

        async function loadActiveChatsList() {
            const list = document.getElementById("active-chats-list");
            const emptyState = document.getElementById("empty-state");
            const myDoc = await db.collection("users").doc(LOG).get();
            const following = myDoc.data().followingList || [];
            
            const fetchPromises = following.map(async (uid) => {
                if(uid === LOG) return null;
                const chatId = getChatId(LOG, uid);
                const chatSnap = await db.collection("chats").doc(chatId).collection("messages").orderBy("timestamp", "desc").limit(20).get();
                
                if (!chatSnap.empty) {
                    const lastMsg = chatSnap.docs[0].data();
                    const uDoc = await db.collection("users").doc(uid).get();
                    
                    let unreadCount = 0;
                    for (let i=0; i < chatSnap.docs.length; i++) {
                        const m = chatSnap.docs[i].data();
                        if (m.sender === uid && !m.read) unreadCount++;
                        else if (m.sender === uid && m.read) break; 
                        if (m.sender === LOG) break; 
                    }
                    return { uid: uid, uData: uDoc.data(), lastMsg: lastMsg, time: lastMsg.timestamp ? lastMsg.timestamp.toMillis() : 0, unreadCount: unreadCount };
                }
                return null;
            });

            let chatData = await Promise.all(fetchPromises);
            chatData = chatData.filter(item => item !== null).sort((a, b) => b.time - a.time);

            list.innerHTML = "";
            if (chatData.length === 0) {
                emptyState.style.display = "block";
            } else {
                emptyState.style.display = "none";
                chatData.forEach(chat => {
                    const { uid, uData, lastMsg, time, unreadCount } = chat;
                    let timeStr = "";
                    if (time) {
                        const diffSecs = Math.floor((Date.now() - time) / 1000);
                        if (diffSecs < 60) timeStr = "now";
                        else if (diffSecs < 3600) timeStr = Math.floor(diffSecs/60) + "m";
                        else if (diffSecs < 86400) timeStr = Math.floor(diffSecs/3600) + "h";
                        else timeStr = Math.floor(diffSecs/86400) + "d";
                    }

                    let isUnread = unreadCount > 0;
                    let displayMsg = "";
                    if (unreadCount > 1) { displayMsg = `${unreadCount} new messages`; } 
                    else {
                        // DETECT GIF TYPE FOR CHAT PREVIEW
                        let rawText = lastMsg.gifUrl ? "Sent a GIF" : (lastMsg.image ? "Sent a photo" : (lastMsg.audioUrl ? "Sent a voice message" : lastMsg.text));
                        displayMsg = lastMsg.sender === LOG ? `You: ${rawText}` : rawText;
                    }
                    
                    const noteHtml = (uData.note && uData.note.text) ? `<div style="position:absolute; top:-5px; left:10px; background:#262626; padding:2px 8px; border-radius:10px; font-size:10px; border:2px solid #000; color:#fff; white-space:nowrap; max-width:60px; overflow:hidden; text-overflow:ellipsis; pointer-events:none; z-index:2;">${uData.note.text}</div>` : '';
                    let textStyle = isUnread ? `color:#fff; font-weight:600;` : `color:#a8a8a8;`;
                    let rightIconHtml = isUnread ? `<div class="unread-dot"></div>` : `<img src="https://cdn-icons-png.flaticon.com/512/3014/3014736.png" class="cam-icon-right" onclick="openLiveCamera('${uid}')">`;

                    list.innerHTML += `
                        <div class="u-row">
                            <div style="display:flex; align-items:center; flex:1; overflow:hidden;" onclick="openMsg('${uid}', '${uData.profileImg || DIMG}')">
                                <div style="position:relative;"><img src="${uData.profileImg || DIMG}" class="pfp">${noteHtml}</div>
                                <div class="u-meta">
                                    <b style="${isUnread ? 'font-weight:700;' : ''}">${uid}</b>
                                    <span style="${textStyle}"><span class="msg-preview-text">${displayMsg}</span>${timeStr ? `&nbsp;· ${timeStr}` : ''}</span>
                                </div>
                            </div>
                            ${rightIconHtml}
                        </div>
                    `;
                });
            }
        }

        async function startAudioRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false } });
                mediaRecorder = new MediaRecorder(stream);
                mediaRecorder.start();
                audioChunks = [];
                mediaRecorder.addEventListener("dataavailable", event => { audioChunks.push(event.data); });
                
                document.getElementById('msg-input-default').style.display = 'none';
                document.getElementById('msg-input-recording').style.display = 'flex';
                recordSeconds = 0; document.getElementById('recording-timer').innerText = "00:00";
                
                recordTimerInterval = setInterval(() => {
                    recordSeconds++;
                    let m = Math.floor(recordSeconds / 60).toString().padStart(2, '0');
                    let s = (recordSeconds % 60).toString().padStart(2, '0');
                    document.getElementById('recording-timer').innerText = `${m}:${s}`;
                }, 1000);
            } catch (err) { alert("Microphone access is required to send voice messages."); }
        }

        function cancelAudioRecording() {
            if(mediaRecorder) { mediaRecorder.stop(); mediaRecorder.stream.getTracks().forEach(track => track.stop()); }
            clearInterval(recordTimerInterval);
            document.getElementById('msg-input-default').style.display = 'flex'; document.getElementById('msg-input-recording').style.display = 'none';
        }

        function sendAudioRecording() {
            if(!mediaRecorder) return;
            showLoading("Sending audio...");
            mediaRecorder.addEventListener("stop", async () => {
                const audioBlob = new Blob(audioChunks, { type: 'audio/webm' }); 
                const formData = new FormData(); formData.append('file', audioBlob); formData.append('upload_preset', UPLOAD_PRESET);
                try {
                    const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/video/upload`, { method: 'POST', body: formData });
                    const data = await res.json();
                    if(data.secure_url) {
                        const chatId = getChatId(LOG, activeChatUser);
                        await db.collection("chats").doc(chatId).collection("messages").add({
                            sender: LOG, text: "", audioUrl: data.secure_url, duration: recordSeconds, read: false, timestamp: firebase.firestore.FieldValue.serverTimestamp()
                        });
                        loadActiveChatsList();
                    }
                } catch(err) { alert("Failed to upload audio."); } finally { hideLoading(); }
            });
            mediaRecorder.stop(); mediaRecorder.stream.getTracks().forEach(track => track.stop());
            clearInterval(recordTimerInterval);
            document.getElementById('msg-input-default').style.display = 'flex'; document.getElementById('msg-input-recording').style.display = 'none';
        }

        window.initAudio = function(id) {
            const audio = document.getElementById('audio-elem-' + id);
            const timeText = document.getElementById('audio-time-' + id);
            if(audio && audio.duration && audio.duration !== Infinity) {
                let s = Math.floor(audio.duration % 60); timeText.innerText = `0:${s.toString().padStart(2, '0')}`;
            }
        }

        window.updateWaveform = function(id) {
            const track = document.getElementById('waveform-' + id); const audio = document.getElementById('audio-elem-' + id); const timeText = document.getElementById('audio-time-' + id);
            const totalDur = parseFloat(timeText.getAttribute('data-duration')) || audio.duration || 1;
            const percentage = audio.currentTime / totalDur;
            const bars = track.querySelectorAll('.wave-bar'); const activeIndex = Math.floor(percentage * bars.length);
            bars.forEach((bar, index) => { bar.style.background = (index <= activeIndex) ? '#fff' : 'rgba(255,255,255,0.4)'; });
            const rem = Math.max(0, totalDur - audio.currentTime); let s = Math.floor(rem % 60); timeText.innerText = `0:${s.toString().padStart(2, '0')}`;
        }

        window.seekAudio = function(e, id) {
            const track = document.getElementById('waveform-' + id); const audio = document.getElementById('audio-elem-' + id); const timeText = document.getElementById('audio-time-' + id);
            const totalDur = parseFloat(timeText.getAttribute('data-duration')) || audio.duration; if(!totalDur) return;
            const rect = track.getBoundingClientRect(); const clickX = e.clientX - rect.left; const percentage = Math.max(0, Math.min(1, clickX / rect.width));
            audio.currentTime = percentage * totalDur; window.updateWaveform(id);
        }

        function toggleAudio(id) {
            const audioEl = document.getElementById('audio-elem-' + id); const playIcon = document.getElementById('audio-play-icon-' + id);
            document.querySelectorAll('audio').forEach(el => {
                if(el.id !== 'audio-elem-' + id && !el.paused) { el.pause(); document.getElementById('audio-play-icon-' + el.id.replace('audio-elem-','')).innerHTML = '<polygon points="8,5 20,12 8,19" fill="white"/>'; }
            });
            if (audioEl.paused) { audioEl.play(); playIcon.innerHTML = '<rect x="6" y="5" width="4" height="14" fill="white"/><rect x="14" y="5" width="4" height="14" fill="white"/>'; } 
            else { audioEl.pause(); playIcon.innerHTML = '<polygon points="8,5 20,12 8,19" fill="white"/>'; }
        }

        function resetAudioUI(id) { document.getElementById('audio-play-icon-' + id).innerHTML = '<polygon points="8,5 20,12 8,19" fill="white"/>'; document.getElementById('audio-elem-' + id).currentTime = 0; window.updateWaveform(id); }
        function toggleSpeed(btn, id) { const audioEl = document.getElementById('audio-elem-' + id); if (audioEl.playbackRate === 1) { audioEl.playbackRate = 1.5; btn.innerText = "1.5x"; } else if (audioEl.playbackRate === 1.5) { audioEl.playbackRate = 2; btn.innerText = "2x"; } else { audioEl.playbackRate = 1; btn.innerText = "1x"; } }

        function compressImage(file, maxWidth = 800, quality = 0.6) {
            return new Promise((resolve) => {
                const reader = new FileReader(); reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image(); img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas'); let width = img.width; let height = img.height;
                        if (width > maxWidth) { height = Math.round((height * maxWidth) / width); width = maxWidth; }
                        canvas.width = width; canvas.height = height; const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, width, height); resolve(canvas.toDataURL('image/jpeg', quality));
                    };
                };
            });
        }

        async function handleChatGalleryUpload(event) {
            const file = event.target.files[0]; if(!file || !activeChatUser) return;
            showLoading("Sending...");
            const base64Img = await compressImage(file); const chatId = getChatId(LOG, activeChatUser);
            await db.collection("chats").doc(chatId).collection("messages").add({ sender: LOG, text: "", image: base64Img, read: false, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
            document.getElementById("chat-gallery-input").value = ""; hideLoading();
        }

        function openImageViewer(base64str) { document.getElementById('iv-main-img').src = base64str; document.getElementById('img-viewer-ov').style.display = 'flex'; }
        function closeImageViewer() { document.getElementById('img-viewer-ov').style.display = 'none'; }
        function downloadViewerImage() { const a = document.createElement('a'); a.href = document.getElementById('iv-main-img').src; a.download = 'auragram_image.jpg'; document.body.appendChild(a); a.click(); document.body.removeChild(a); }

        async function loadMutualSuggestions() {
            const list = document.getElementById("suggestion-list");
            try {
                const myDoc = await db.collection("users").doc(LOG).get();
                const myFollowing = myDoc.data().followingList || [];
                let suggestionsArray = [];
                const fallbackSnap = await db.collection("users").limit(10).get();
                fallbackSnap.forEach(doc => { if(doc.id !== LOG && !myFollowing.includes(doc.id) && suggestionsArray.length < 5) suggestionsArray.push({uid: doc.id, count: 0, mutualName: null}); });
                list.innerHTML = "";
                if(suggestionsArray.length === 0) return list.innerHTML = "<p style='color:#555; font-size:14px;'>No accounts to follow.</p>";
                for(let sug of suggestionsArray) {
                    const uDoc = await db.collection("users").doc(sug.uid).get(); const uData = uDoc.exists ? uDoc.data() : {};
                    list.innerHTML += `<div class="u-row"><img src="${uData.profileImg || DIMG}" class="pfp"><div class="u-meta" onclick="location.href='profile.html?u=${sug.uid}'"><b>${sug.uid}</b><span>Suggested for you</span></div><button class="b-blue-indigo" onclick="alert('Follow logic connected to profile')">Follow</button></div>`;
                }
            } catch(e) {}
        }

        async function openNewMessageMenu() {
            document.getElementById("new-msg-overlay").style.display = "flex";
            const list = document.getElementById("follower-suggestion-list");
            list.innerHTML = "<p style='color:#555; text-align:center; padding:20px;'>Loading friends...</p>";
            const myDoc = await db.collection("users").doc(LOG).get();
            const myFollowing = myDoc.data().followingList || []; const myFollowers = myDoc.data().followerList || [];
            const mutualFriends = myFollowing.filter(uid => myFollowers.includes(uid) && uid !== LOG);
            if(mutualFriends.length === 0) return list.innerHTML = "<p style='color:#555; text-align:center; padding:20px;'>No mutual followers found to message.</p>";
            list.innerHTML = "";
            for(let uid of mutualFriends) {
                const uDoc = await db.collection("users").doc(uid).get(); const uData = uDoc.data();
                list.innerHTML += `<div class="u-row" onclick="openMsg('${uid}', '${uData.profileImg || DIMG}')" style="padding:10px 0;"><img src="${uData.profileImg || DIMG}" class="pfp" style="width:45px; height:45px;"><div class="u-meta"><b>${uid}</b><span style="font-size: 13px; color: #888;">${uData.name || ''}</span></div><div style="width:20px; height:20px; border-radius:50%; border:1px solid #444;"></div></div>`;
            }
        }

        function closeNewMessageMenu() { document.getElementById("new-msg-overlay").style.display = "none"; }

        async function openMsg(targetUser, pfpUrl) {
            activeChatUser = targetUser; activeChatPfp = pfpUrl || DIMG; 
            document.getElementById("chat-uid").innerText = targetUser; document.getElementById("chat-pfp").src = activeChatPfp;
            
            const box = document.getElementById("msg-list");
            box.innerHTML = `<div style="text-align:center; padding:50px; color:#555;">Loading...</div>`;
            document.getElementById("msg-view").style.display = "flex"; closeNewMessageMenu();
            
            const tDoc = await db.collection("users").doc(targetUser).get(); const tData = tDoc.exists ? tDoc.data() : {};
            const profileCardHtml = `<div class="chat-profile-card"><img src="${activeChatPfp}"><h2>${tData.name || targetUser}</h2><span class="uname">${targetUser}</span><span class="rel">You follow each other on Auragram</span><button onclick="location.href='profile.html?u=${targetUser}'">View profile</button></div>`;
            const chatId = getChatId(LOG, targetUser);
            
            db.collection("chats").doc(chatId).collection("messages").orderBy("timestamp", "desc").limit(20).get().then(snap => {
                const batch = db.batch(); let updated = false;
                snap.forEach(doc => { if(doc.data().sender === targetUser && doc.data().read !== true) { batch.update(doc.ref, {read: true}); updated = true; } });
                if(updated) batch.commit();
            });
            
            msgUnsubscribe = db.collection("chats").doc(chatId).collection("messages").orderBy("timestamp", "asc").onSnapshot(snap => {
                box.innerHTML = profileCardHtml; let lastDate = null;
                snap.forEach(doc => {
                    const m = doc.data(); const isMe = m.sender === LOG;
                    let dateObj = m.timestamp ? m.timestamp.toDate() : new Date();
                    let exactTimeStr = dateObj.toLocaleTimeString('en-US', {hour: 'numeric', minute:'2-digit'}); 
                    
                    if (!lastDate || (dateObj - lastDate) > 3600000) { 
                        let dividerStr = dateObj.toLocaleString('en-GB', { day: 'numeric', month: 'short', hour: 'numeric', minute: '2-digit', hour12: true });
                        box.innerHTML += `<div class="time-divider">${dividerStr}</div>`;
                    } lastDate = dateObj;

                    let msgContent = ""; let bubbleClass = isMe ? 'msg-sent' : 'msg-recv';

                    if(m.audioUrl) {
                        bubbleClass += ' msg-audio-bubble';
                        const staticWave = Array.from({length: 30}).map(() => `<div class="wave-bar" style="height:${Math.random() * 60 + 20}%"></div>`).join('');
                        let durStr = "0:00"; if(m.duration) { let s = Math.floor(m.duration % 60); durStr = `0:${s.toString().padStart(2, '0')}`; }
                        msgContent = `<div class="audio-main-row"><div class="audio-play-btn" onclick="toggleAudio('${doc.id}')"><svg id="audio-play-icon-${doc.id}" width="20" height="20" viewBox="0 0 24 24"><polygon points="6,4 20,12 6,20" fill="white"/></svg></div><div class="audio-waveform-track" id="waveform-${doc.id}" onclick="seekAudio(event, '${doc.id}')">${staticWave}</div><div class="audio-right-controls"><span id="audio-time-${doc.id}" class="audio-time-text" data-duration="${m.duration||0}">${durStr}</span><span class="audio-speed-btn" onclick="toggleSpeed(this, '${doc.id}')">1x</span></div></div><audio id="audio-elem-${doc.id}" src="${m.audioUrl}" onloadedmetadata="initAudio('${doc.id}')" ontimeupdate="updateWaveform('${doc.id}')" onended="resetAudioUI('${doc.id}')" style="display:none;"></audio>`;
                    } else if (m.image) {
                        bubbleClass += ' msg-img-bubble';
                        msgContent = `<img src="${m.image}" onclick="openImageViewer('${m.image}')">`;
                    } else if (m.gifUrl) {
                        // RENDER THE GIF DIRECTLY FROM KLIPY
                        bubbleClass += ' msg-img-bubble';
                        msgContent = `<img src="${m.gifUrl}" style="border-radius:18px; max-width:220px; width:100%; height:auto;" alt="GIF">`;
                    } else {
                        msgContent = m.text;
                    }
                    
                    let pfpHtml = !isMe ? `<img src="${activeChatPfp}" class="msg-recv-pfp">` : `<div style="width:28px; margin-right:8px; flex-shrink:0;"></div>`;

                    box.innerHTML += `
                        <div class="msg-row-wrapper">
                            <div class="msg-row-inner" style="justify-content: ${isMe ? 'flex-end' : 'flex-start'};">
                                ${!isMe ? pfpHtml : ''}
                                <div class="msg-bubble ${bubbleClass}">${msgContent}</div>
                            </div>
                            <div class="msg-exact-time">${exactTimeStr}</div>
                        </div>
                    `;
                });
                // Ensure chat stays scrolled to the bottom when new message arrives
                setTimeout(() => { box.scrollTop = box.scrollHeight; }, 50);
            });
        }

        function closeMsg() {
            document.getElementById("msg-view").style.display = "none";
            gifOverlay.className = ''; // Hide gif sheet if open
            if(msgUnsubscribe) { msgUnsubscribe(); msgUnsubscribe = null; }
            activeChatUser = null;
            loadActiveChatsList();
        }

        function checkMsgInput() {
            const val = document.getElementById("msg-input").value.trim();
            if(val) {
                document.getElementById("pill-left-cam").style.display = "none"; document.getElementById("pill-left-search").style.display = "flex";
                document.getElementById("pill-right-icons").style.display = "none"; document.getElementById("pill-right-send").style.display = "flex";
            } else {
                document.getElementById("pill-left-cam").style.display = "flex"; document.getElementById("pill-left-search").style.display = "none";
                document.getElementById("pill-right-icons").style.display = "flex"; document.getElementById("pill-right-send").style.display = "none";
            }
        }

        function handleEnter(e) { if(e.key === "Enter") sendMsg(); }

        async function sendMsg() {
            const input = document.getElementById("msg-input"); const text = input.value.trim();
            if(!text || !activeChatUser) return;
            input.value = ""; checkMsgInput(); 
            const chatId = getChatId(LOG, activeChatUser);
            await db.collection("chats").doc(chatId).collection("messages").add({
                sender: LOG, text: text, read: false, timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            loadActiveChatsList(); 
        }

        init();
    </script>
