<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Moon Local Fix</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: #000; font-family: sans-serif;
        }
        canvas { position: absolute; top: 0; left: 0; z-index: 10; pointer-events: none; }
        #video { display: none; } 
        #status {
            position: absolute; top: 20px; left: 20px;
            z-index: 20; color: rgba(255, 255, 255, 0.4); 
            font-size: 0.8rem; font-family: monospace;
        }
    </style>
</head>
<body>
    <div id="status">SENSOR: 0%</div>
    <video id="video" autoplay playsinline muted></video>
    <canvas id="ui"></canvas>

    <script>
        const video = document.getElementById('video');
        const status = document.getElementById('status');
        const canvas = document.getElementById('ui');
        const ctx = canvas.getContext('2d');
        
        // --- MOON LOADING ---
        const moonImg = new Image();
        let moonLoaded = false;
        
        moonImg.onload = () => { 
            moonLoaded = true; 
            console.log("Moon image loaded successfully.");
        };
        
        moonImg.onerror = () => {
            console.warn("Moon image NOT found. Using fallback glow.");
        };

        // Ensure this file is in the SAME folder as this HTML file
        moonImg.src = 'moon_PNG51.png'; 

        const senseCanvas = document.createElement('canvas');
        const senseCtx = senseCanvas.getContext('2d');
        senseCanvas.width = 8; senseCanvas.height = 8;

        let smoothGlow = 0; 
        let particles = [];
        const symbols = ["SORRY", "sorry", "🫩", "⚡", "💖", "💓", "🎀"];

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            for(let i = 0; i < 85; i++) {
                const txt = symbols[Math.floor(Math.random() * symbols.length)];
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    text: txt,
                    size: Math.random() * 20 + 22,
                    speed: (txt === "⚡") ? (Math.random() * 3 + 2.5) : (Math.random() * 1.2 + 0.6),
                    drift: (Math.random() - 0.5) * 0.4
                });
            }
        }

        async function startCam() {
            try {
                const s = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" } 
                });
                video.srcObject = s;
                video.play();
            } catch (e) { status.innerText = "CAM ERROR"; }
        }

        function draw() {
            let lightLevel = 0;
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                senseCtx.drawImage(video, 0, 0, 8, 8);
                const data = senseCtx.getImageData(0, 0, 8, 8).data;
                let lum = 0;
                for (let i = 0; i < data.length; i += 4) {
                    lum += (0.2126 * data[i] + 0.7152 * data[i+1] + 0.0722 * data[i+2]);
                }
                lightLevel = (lum / 64) / 255;
            }

            const pct = Math.round(lightLevel * 100);
            status.innerText = `SENSOR: ${pct}%`;

            let targetGlow = 0;
            if (pct > 30) targetGlow = 0;
            else if (pct <= 30 && pct >= 20) targetGlow = 0.1;
            else targetGlow = 0.1 + (1 - (pct / 20)) * 0.9;

            smoothGlow += (targetGlow - smoothGlow) * 0.1; 

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (smoothGlow > 0.01) {
                const centerX = canvas.width / 2;
                const centerY = canvas.height / 2;
                const moonSize = Math.min(canvas.width, canvas.height) * 0.5;

                // --- DRAW MOON ---
                ctx.save();
                ctx.globalAlpha = smoothGlow;
                
                if (moonLoaded) {
                    // Use the actual image
                    ctx.drawImage(moonImg, centerX - moonSize/2, centerY - moonSize/2, moonSize, moonSize);
                } else {
                    // Fallback: A glowing white circle if image is missing
                    const grad = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, moonSize/2);
                    grad.addColorStop(0, 'rgba(255, 255, 255, 1)');
                    grad.addColorStop(0.8, 'rgba(255, 255, 255, 0.2)');
                    grad.addColorStop(1, 'rgba(255, 255, 255, 0)');
                    ctx.fillStyle = grad;
                    ctx.beginPath();
                    ctx.arc(centerX, centerY, moonSize/2, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.restore();

                // --- DRAW PARTICLES ---
                particles.forEach(p => {
                    p.y -= p.speed;
                    p.x += p.drift;
                    if(p.y < -60) p.y = canvas.height + 60;
                    
                    ctx.font = `900 ${p.size}px Arial`;
                    ctx.textAlign = "center";
                    
                    ctx.globalAlpha = smoothGlow * 0.4;
                    ctx.fillStyle = "#ff007f"; 
                    ctx.fillText(p.text, p.x, p.y);

                    ctx.globalAlpha = smoothGlow;
                    ctx.fillStyle = "#ffffff";
                    ctx.fillText(p.text, p.x, p.y);
                });
            }
            requestAnimationFrame(draw);
        }

        window.onresize = init;
        init();
        startCam();
        requestAnimationFrame(draw);
    </script>
</body>
</html>
