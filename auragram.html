<!DOCTYPE html>
<html>
<head>
    <title>Reactive Glow Sorry</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: #000; 
        }
        canvas { display: block; }
        video { display: none; }
    </style>
</head>
<body>
    <video id="video" autoplay></video>
    <canvas id="ui"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('ui');
        const ctx = canvas.getContext('2d');
        
        const senseCanvas = document.createElement('canvas');
        const senseCtx = senseCanvas.getContext('2d');
        senseCanvas.width = 50; senseCanvas.height = 50;

        let rawLight = 1; 
        let smoothGlow = 0; // The "Intensity" of our neon
        let particles = [];
        const symbols = ["SORRY", "sorry", "🫩", "💖", "🎀"];

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            for(let i = 0; i < 60; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    text: symbols[Math.floor(Math.random() * symbols.length)],
                    size: Math.random() * 35 + 15,
                    speed: (Math.random() * 0.5) + 0.2
                });
            }
        }

        navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } })
            .then(stream => { video.srcObject = stream; });

        function draw() {
            // 1. Analyze Light
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                senseCtx.drawImage(video, 0, 0, 50, 50);
                const data = senseCtx.getImageData(0, 0, 50, 50).data;
                let lum = 0;
                for (let i = 0; i < data.length; i += 4) {
                    lum += (0.2126 * data[i]) + (0.7152 * data[i+1]) + (0.0722 * data[i+2]);
                }
                rawLight = lum / (data.length / 4) / 255;
            }

            // 2. The Glow "Action" Logic
            // If rawLight is low (0), targetGlow is 1 (Max Pink). 
            // If rawLight is high (1), targetGlow is 0 (Dull White).
            let targetGlow = 1 - (rawLight * 1.5); 
            if(targetGlow < 0) targetGlow = 0;

            // Smoothing the transition so it feels like a real fluorescent bulb warming up
            smoothGlow += (targetGlow - smoothGlow) * 0.1;

            // 3. Render
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            particles.forEach(p => {
                // Calculate Fluorescent Pink based on light absence
                // High glow = Bright Pink (255, 20, 147), Low glow = Dim White (100, 100, 100)
                const r = Math.floor(100 + (155 * smoothGlow));
                const g = Math.floor(100 - (80 * smoothGlow));
                const b = Math.floor(100 + (47 * smoothGlow));
                const color = `rgb(${r}, ${g}, ${b})`;

                ctx.save();
                ctx.font = `bold ${p.size}px sans-serif`;
                
                // Only apply shadow/glow if it's dark
                if (smoothGlow > 0.1) {
                    ctx.shadowColor = `rgba(255, 20, 147, ${smoothGlow})`;
                    ctx.shadowBlur = smoothGlow * 40;
                }

                ctx.fillStyle = color;
                ctx.fillText(p.text, p.x, p.y);
                ctx.restore();

                // Movement
                p.y -= p.speed; 
                if(p.y < -50) p.y = canvas.height + 50;
            });

            requestAnimationFrame(draw);
        }

        window.onresize = init;
        init();
        draw();
    </script>
</body>
</html>
