<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    
    <meta property="og:title" content="Auragram Reel">
    <meta property="og:description" content="Watch this content on Auragram">
    <meta property="og:image" content="https://cdn-icons-png.flaticon.com/512/1946/1946436.png">
    <meta property="og:type" content="video.other">

    <title>Auragram | Explore</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    
    <style>
        /* =========================================
           AURAGRAM CSS CORE - v3.0.2
           =========================================
        */
        * { margin:0; padding:0; box-sizing:border-box; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; -webkit-tap-highlight-color:transparent; }
        body { background:#000; color:#fff; overflow-x:hidden; min-height:100vh; position: relative; }
        ::-webkit-scrollbar { display:none; }

        /* HEADER & SEARCH */
        .search-container { position: sticky; top: 0; background: #000; padding: 10px 12px; z-index: 2000; border-bottom: 0.1px solid #262626; }
        .search-bar { background: #262626; border-radius: 10px; padding: 8px 12px; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
        .search-bar input { background: transparent; border: none; color: #fff; outline: none; width: 100%; font-size: 15px; }
        
        #search-results { position: fixed; top: 54px; left: 0; width: 100%; height: calc(100% - 104px); background: #000; z-index: 3000; display: none; overflow-y: auto; }
        .u-row { display: flex; align-items: center; padding: 12px 16px; border-bottom: 0.1px solid #1a1a1a; cursor: pointer; }
        .u-row img { width: 44px; height: 44px; border-radius: 50%; margin-right: 12px; object-fit: cover; border: 1px solid #333;}
        .u-info b { font-size: 14px; display: block; }
        .u-info span { font-size: 12px; color: #8e8e8e; }

        /* EXPLORE GRID */
        #explore-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; padding: 2px; padding-bottom: 70px; }
        .g-item { aspect-ratio: 4/5; background: #121212; position: relative; overflow: hidden; cursor: pointer; }
        .g-item img { width: 100%; height: 100%; object-fit: cover; }

        /* REELS PLAYER SYSTEM */
        .full-view { position:fixed; top:0; left:0; width:100vw; height:100dvh; background:#000; z-index:7000; display:none; flex-direction:column; }
        .reels-scroll-container { height:100dvh; width:100%; overflow-y:scroll; scroll-snap-type: y mandatory; scrollbar-width:none; -webkit-overflow-scrolling: touch; }
        .no-scroll { overflow-y: hidden !important; touch-action: none; } 
        
        .reel-item { height:100dvh; width:100%; scroll-snap-align: start; scroll-snap-stop: always; position:relative; background:#000; display: flex; align-items: center; justify-content: center; overflow: hidden; }

        .media-box { width:100%; height:100%; position:relative; display:flex; align-items:center; justify-content:center; }
        .media-box video { width:100%; height:100%; object-fit: contain; background: transparent; }
        .yt-clip-box { width:100%; height:100%; position:relative; overflow:hidden; }
        .yt-clip-box iframe { width:100%; height:140%; position:absolute; top:-20%; left:0; pointer-events:none; }

        /* PLAYER OVERLAYS */
        .r-back { position:absolute; top:20px; left:15px; z-index:8500; cursor:pointer; background: rgba(0,0,0,0.4); width: 38px; height: 38px; border-radius: 50%; display:flex; align-items:center; justify-content:center; }
        .r-sidebar { position:absolute; bottom:100px; right:12px; display:flex; flex-direction:column; gap:20px; align-items:center; z-index:80; }
        .r-act { display:flex; flex-direction:column; align-items:center; gap:5px; cursor: pointer; }
        .r-act img { width: 28px; filter: invert(1); }
        .r-act span { font-size: 12px; font-weight: 600; text-shadow: 1px 1px 2px #000; }

        .r-info { position:absolute; bottom:40px; left:15px; z-index:80; width: 75%; display: flex; flex-direction: column; }
        .r-user { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
        .r-pfp { width:34px; height:34px; border-radius:50%; object-fit:cover; border: 1.5px solid #fff; }
        .f-btn { font-size:13px; font-weight:700; color:#0095f6; cursor:pointer; }
        
        /* EXPANDABLE CAPTION */
        .r-caption-container { position: relative; width: 100%; }
        .r-caption { font-size:14px; text-shadow: 1px 1px 2px #000; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; max-height: 40px; transition: max-height 0.3s ease-in-out; word-wrap: break-word; }
        .r-caption.expanded { -webkit-line-clamp: 100; max-height: 250px; overflow-y: auto; pointer-events: auto; padding-right: 5px; -webkit-mask-image: linear-gradient(to bottom, black 85%, transparent 100%); mask-image: linear-gradient(to bottom, black 85%, transparent 100%); }
        .r-caption.expanded::-webkit-scrollbar { display: block; width: 4px; }
        .r-caption.expanded::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.4); border-radius: 10px; }
        .caption-more { font-weight: 600; color: #a8a8a8; cursor: pointer; font-size: 13px; margin-top: 2px; text-shadow: 1px 1px 2px #000; display: inline-block; }

        /* IN-APP PLAY OVERLAY */
        .play-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 50; width: 70px; display: none; filter: invert(1); cursor: pointer; opacity: 0.8; transition: opacity 0.2s; }
        .play-overlay:active { opacity: 0.5; transform: translate(-50%, -50%) scale(0.9); }
        #vol-hint { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.6); padding: 15px; border-radius: 50%; z-index: 9000; pointer-events: none; display: none; }
        #vol-icon { width: 30px; filter: invert(1); }

        /* COMMENTS MODAL (INSTAGRAM EXACT UI) */
        #comment-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh; background: rgba(0,0,0,0.5); z-index: 10000; display: none; flex-direction: column; justify-content: flex-end; }
        .comment-sheet { background: #262626; width: 100%; height: 70dvh; border-radius: 15px 15px 0 0; display: flex; flex-direction: column; position: relative; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        .c-header { display: flex; align-items: center; justify-content: center; padding: 15px; border-bottom: 0.1px solid #3d3d3d; position: relative; }
        .c-header h3 { font-size: 16px; font-weight: 600; }
        .c-close-line { width: 40px; height: 4px; background: #555; border-radius: 2px; position: absolute; top: 8px; left: 50%; transform: translateX(-50%); }
        
        .c-list { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 18px; }
        .c-item { display: flex; gap: 12px; }
        .c-item-pfp { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; border: 1px solid #333; }
        .c-content { flex: 1; }
        .c-user-time { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; }
        .c-username { font-weight: 600; font-size: 13px; color: #f5f5f5; }
        .c-time { font-size: 12px; color: #a8a8a8; }
        .c-text { font-size: 14px; color: #fff; line-height: 1.4; word-wrap: break-word; }
        .c-actions { display: flex; gap: 15px; margin-top: 6px; align-items: center; }
        .c-reply-btn { font-size: 12px; color: #a8a8a8; font-weight: 600; cursor: pointer; }
        
        /* Updated Comment Like Button */
        .c-like-icon { width: 14px; height: 14px; object-fit: contain; flex-shrink: 0; filter: invert(0.6); cursor: pointer; transition: transform 0.1s; margin-top: 2px; }
        .c-like-icon:active { transform: scale(0.8); }
        
        /* Nested Replies CSS */
        .c-view-replies { font-size: 12px; color: #a8a8a8; font-weight: 600; cursor: pointer; margin-top: 10px; display: flex; align-items: center; gap: 8px; }
        .c-view-replies::before { content: ""; display: block; width: 24px; height: 1px; background: #a8a8a8; }
        .c-replies-container { margin-top: 15px; display: flex; flex-direction: column; gap: 15px; }

        .c-input-area { background: #000; border-top: 0.1px solid #3d3d3d; padding: 10px 15px; display: flex; align-items: center; gap: 10px; padding-bottom: max(10px, env(safe-area-inset-bottom)); }
        .c-input-pfp { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        .c-input-box { flex: 1; display: flex; align-items: center; background: #262626; border-radius: 20px; padding: 0 15px; height: 40px; }
        .c-input-box input { flex: 1; background: transparent; border: none; color: #fff; font-size: 14px; outline: none; }
        .c-post-btn { color: #0095f6; font-weight: 600; font-size: 14px; cursor: pointer; opacity: 0.5; pointer-events: none; transition: opacity 0.2s; }
        .c-post-btn.active { opacity: 1; pointer-events: auto; }

        /* GUEST RESTRICTION UI */
        #guest-restriction-banner { position: absolute; bottom: 0; left: 0; width: 100%; background: linear-gradient(transparent, rgba(0,0,0,0.95) 40%); color: #fff; text-align: center; padding: 60px 20px 30px; z-index: 9500; display: none; }
        .login-cta-btn { background: #0095f6; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; width: 100%; margin-top: 15px; font-size: 15px; }

        #action-modal { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:20000; display:none; align-items:center; justify-content:center; padding:30px; }
        .modal-box { background:#262626; width:100%; max-width:300px; border-radius:15px; text-align:center; overflow:hidden; }
        .modal-box h3 { padding: 25px 20px; font-size: 17px; font-weight: 600; line-height: 1.4; border-bottom: 0.1px solid #3d3d3d; }
        .modal-btn-blue { padding: 15px; color: #0095f6; font-weight: 800; font-size: 14px; cursor: pointer; border-bottom: 0.1px solid #3d3d3d; }
        .modal-btn-cancel { padding: 13px; color: #fff; font-size: 14px; cursor: pointer; }

        /* LOADING & FEEDBACK */
        .loader-ring { position: absolute; width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid #fff; border-radius: 50%; animation: spin 0.8s linear infinite; z-index: 5; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #toast { position:fixed; bottom:70px; left:50%; transform:translateX(-50%); background:#fff; color:#000; padding:10px 20px; border-radius:25px; display:none; z-index:25000; font-size:13px; font-weight:bold; }

        /* HEART ANIMATIONS */
        @keyframes heartAnim{0%{transform:translate(-50%,-50%) scale(0);opacity:0}20%{transform:translate(-50%,-50%) scale(1.3);opacity:1}100%{transform:translate(-50%,-50%) scale(1.6);opacity:0}}
        .animate-heart{position:absolute; width:110px; pointer-events:none; z-index:100; filter:invert(27%) sepia(91%) saturate(7333%) hue-rotate(345deg) brightness(98%) contrast(97%); animation:heartAnim 0.8s ease-out forwards}

        @keyframes floatUp{0%{transform:translateY(0) rotate(0deg) scale(1);opacity:1}100%{transform:translateY(-180px) rotate(25deg) scale(0.4);opacity:0}}
        .mini-heart{position:absolute;width:28px;pointer-events:none;z-index:8100;filter:invert(27%) sepia(91%) saturate(7333%) hue-rotate(345deg) brightness(98%) contrast(97%);animation:floatUp 0.8s ease-out forwards}

        /* BOTTOM NAVIGATION */
        .b-bar { position:fixed; bottom:0; width:100%; height:50px; background:#000; border-top:.1px solid #262626; display:flex; justify-content:space-around; align-items:center; z-index:1000; }
        .b-bar img:not(#b-pfp-img) { width:24px; filter:invert(1); cursor:pointer; }
        #b-pfp-img { width:26px; height:26px; border-radius:50%; object-fit:cover; border:1px solid #fff; background: #262626; }
    </style>
</head>
<body>

    <div class="search-container" id="top-search-ui">
        <div class="search-bar">
            <input type="text" id="s-input" placeholder="Search Auragram" oninput="liveSearch(this.value)">
            <img id="s-close" src="https://cdn-icons-png.flaticon.com/512/2734/2734822.png" style="width:14px; filter:invert(1); display:none; cursor:pointer;" onclick="clearSearch()">
        </div>
        <div id="search-results"></div>
    </div>

    <div id="explore-grid"></div>

    <div id="reel-player-view" class="full-view">
        <div class="r-back" id="r-back-btn" onclick="closePlayer()">
            <img src="https://cdn-icons-png.flaticon.com/512/271/271218.png" style="width:18px; filter:invert(1);">
        </div>
        
        <div id="vol-hint"><img id="vol-icon" src="https://cdn-icons-png.flaticon.com/512/3127/3127501.png"></div>

        <div id="explore-scroll-container" class="reels-scroll-container"></div>

        <div id="guest-restriction-banner">
            <p style="font-weight: 600;">Log in to see more content and join the community</p>
            <button class="login-cta-btn" onclick="location.href='index.html'">Log In to Auragram</button>
        </div>
    </div>

    <div id="comment-overlay" onclick="closeComments(event)">
        <div class="comment-sheet" onclick="event.stopPropagation()">
            <div class="c-header">
                <div class="c-close-line"></div>
                <h3>Comments</h3>
            </div>
            <div class="c-list" id="c-list-box">
                </div>
            <div class="c-input-area">
                <img id="c-user-pfp" src="https://www.w3schools.com/howto/img_avatar.png" class="c-input-pfp">
                <div class="c-input-box">
                    <input type="text" id="c-text-input" placeholder="Add a comment..." oninput="togglePostBtn()">
                    <span class="c-post-btn" id="c-post-btn-action" onclick="submitComment()">Post</span>
                </div>
            </div>
        </div>
    </div>

    <div id="action-modal">
        <div class="modal-box">
            <h3>Log in to interact with this post</h3>
            <div class="modal-btn-blue" onclick="location.href='index.html'">Go to Login Page</div>
            <div class="modal-btn-cancel" onclick="closeModal()">Cancel</div>
        </div>
    </div>

    <div id="toast"></div>

    <div class="b-bar" id="bottom-nav-bar">
        <img src="https://cdn-icons-png.flaticon.com/512/1946/1946436.png" onclick="location.href='index.html'">
        <img src="https://cdn-icons-png.flaticon.com/512/5948/5948514.png" onclick="openReelsOnly()">
        <img src="https://cdn-icons-png.flaticon.com/512/3161/3161837.png" onclick="checkGuestAction('add.html')">
        <img id="explore-nav-icon" src="https://cdn-icons-png.flaticon.com/512/622/622669.png" style="border-bottom: 2px solid #fff; padding-bottom:2px;" onclick="location.href='explore.html'">
        <img id="b-pfp-img" src="" onclick="checkGuestAction('profile.html?u=' + LOG)">
    </div>

    <script>
        /* =========================================
           AURAGRAM JAVASCRIPT CORE - v3.0.2
           =========================================
        */
        const LOG = localStorage.getItem("loggedUser");
        const urlParams = new URLSearchParams(window.location.search);
        const sharedUserId = urlParams.get('u'), sharedPostId = urlParams.get('p'), sharedType = urlParams.get('t') || 'reel';

        const config = {apiKey:"AIzaSyAHjilh7jAlS0e5qDKxbDZq3nbe3pFe4nE",authDomain:"instagram-e8c7a.firebaseapp.com",projectId:"instagram-e8c7a",storageBucket:"instagram-e8c7a.firebasestorage.app",messagingSenderId:"270990839800",appId:"1:270990839800:web:7f56ea2ea8d941219fd00d"};
        firebase.initializeApp(config);
        const db = firebase.firestore(), DIMG = "https://www.w3schools.com/howto/img_avatar.png";

        let exploreFeed = [], activeFeed = [], allUsers = [], ytPlayers = {}, tapTimer = null;
        let loadObserver, playObserver, isMuted = true; // Default true to allow autoplay in apps!
        let unloadTimeouts = {}; 
        let activeCommentIndex = -1; 
        let currentReplyToId = null; // Track reply state

        function showToast(msg) {
            const t = document.getElementById("toast"); t.innerText = msg;
            t.style.display = "block"; setTimeout(() => t.style.display = "none", 2500);
        }

        function checkGuestAction(target) {
            if(!LOG) { document.getElementById("action-modal").style.display = "flex"; }
            else { location.href = target; }
        }

        function closeModal() { document.getElementById("action-modal").style.display = "none"; }

        function onYouTubeIframeAPIReady() {}

        function stopMedia() {
            document.querySelectorAll('video').forEach(v => { v.pause(); v.muted = true; });
            Object.values(ytPlayers).forEach(p => { if(p.pauseVideo) p.pauseVideo(); });
        }

        function initObservers() {
            loadObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const idx = parseInt(entry.target.dataset.idx);
                    if (entry.isIntersecting) {
                        loadContent(idx);
                    } else {
                        unloadContent(idx);
                    }
                });
            }, { rootMargin: "100% 0px 100% 0px" });

            playObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const idx = parseInt(entry.target.dataset.idx);
                    if (entry.isIntersecting) {
                        stopMedia(); playContent(idx);
                    } else {
                        pauseContent(idx);
                    }
                });
            }, { threshold: 0.7 });
        }

        // MAIN INITIALIZATION
        async function init() {
            initObservers();

            if (sharedPostId) {
                await handleSharedContent();
            } else {
                if(!LOG) { location.href = 'index.html'; return; }
                await loadGlobalExplore();
            }
        }

        async function handleSharedContent() {
            const path = sharedType === 'reel' ? 'reels' : 'posts';
            try {
                const postDoc = await db.collection("users").doc(sharedUserId).collection(path).doc(sharedPostId).get();
                const userDoc = await db.collection("users").doc(sharedUserId).get();

                if (postDoc.exists) {
                    const sharedItem = { ...postDoc.data(), id: postDoc.id, owner: sharedUserId, pfp: userDoc.data().profileImg || DIMG, type: sharedType };
                    exploreFeed = [sharedItem];
                    
                    if (!LOG) {
                        document.getElementById('guest-restriction-banner').style.display = 'block';
                        document.getElementById('explore-scroll-container').classList.add('no-scroll');
                        document.getElementById('r-back-btn').style.display = 'none';
                        document.getElementById('top-search-ui').style.display = 'none';
                        document.getElementById('bottom-nav-bar').style.display = 'none';
                    } else {
                        await loadGlobalExplore(sharedPostId);
                    }
                    openFullFeed(0, exploreFeed);
                } else {
                    showToast("Content no longer available");
                }
            } catch(e) { console.error(e); }
        }

        async function loadGlobalExplore(excludeId = null) {
            const usersSnap = await db.collection("users").get();
            let feedPromises = [];
            
            usersSnap.forEach(uDoc => {
                const uid = uDoc.id, pfp = uDoc.data().profileImg || DIMG;
                if(uid === LOG) document.getElementById("b-pfp-img").src = pfp;
                allUsers.push({ id: uid, ...uDoc.data() });
                
                feedPromises.push(db.collection("users").doc(uid).collection("posts").get().then(s => s.docs.map(d => ({...d.data(), id:d.id, owner:uid, pfp, type:'post'}))));
                feedPromises.push(db.collection("users").doc(uid).collection("reels").get().then(s => s.docs.map(d => ({...d.data(), id:d.id, owner:uid, pfp, type:'reel'}))));
            });

            const results = await Promise.all(feedPromises);
            let combined = results.flat().filter(item => item.id !== excludeId).sort(() => Math.random() - 0.5);
            
            if (excludeId) {
                exploreFeed = [...exploreFeed, ...combined]; 
                renderExploreGrid(); 
            } else {
                exploreFeed = combined;
                renderExploreGrid();
            }
        }

        function renderExploreGrid() {
            const grid = document.getElementById("explore-grid");
            grid.innerHTML = exploreFeed.map((item, idx) => `
                <div class="g-item" onclick="openFullFeed(${idx}, exploreFeed)">
                    <img src="${item.type==='reel' ? (item.thumbnail || item.videoUrl) : item.image}" loading="lazy">
                </div>
            `).join('');
        }

        function openFullFeed(startIdx, source) {
            stopMedia();
            activeFeed = source;
            document.getElementById("reel-player-view").style.display = "flex";
            const cont = document.getElementById("explore-scroll-container");
            
            cont.innerHTML = activeFeed.map((item, i) => {
                const isLiked = (item.likes || []).includes(LOG);
                const hasCaption = item.caption && item.caption.trim().length > 0;
                return `
                <div class="reel-item" id="reel-cont-${item.id}" data-idx="${i}" data-id="${item.id}">
                    <div class="media-box" id="media-slot-${i}" onclick="handlePlayerTap(${i}, event)">
                        <div class="loader-ring"></div>
                    </div>
                    
                    <div class="r-sidebar">
                        <div class="r-act" onclick="processLike(${i})">
                            <img id="like-icon-${i}" src="https://cdn-icons-png.flaticon.com/512/${isLiked?'833/833472':'1077/1077035'}.png" style="filter:${isLiked?'invert(27%) sepia(91%) saturate(7333%) hue-rotate(345deg) brightness(98%) contrast(97%)':'invert(1)'}">
                            <span id="like-count-${i}">${(item.likes||[]).length}</span>
                        </div>
                        <div class="r-act" onclick="openComments(${i})">
                            <img src="https://cdn-icons-png.flaticon.com/512/1380/1380338.png"><span>${(item.commentCount || 0)}</span>
                        </div>
                        <div class="r-act" onclick="copyShareLink(${i})">
                            <img src="https://cdn-icons-png.flaticon.com/512/2099/2099085.png"><span>Share</span>
                        </div>
                    </div>
                    <div class="r-info">
                        <div class="r-user">
                            <img src="${item.pfp}" class="r-pfp">
                            <b>${item.owner}</b>
                        </div>
                        ${hasCaption ? `
                        <div class="r-caption-container">
                            <p class="r-caption" id="cap-${i}">${item.caption}</p>
                            <span class="caption-more" id="cap-btn-${i}" onclick="toggleCaption(${i})">more</span>
                        </div>` : ''}
                    </div>
                </div>`;
            }).join('');

            cont.querySelectorAll('.reel-item').forEach(el => {
                loadObserver.observe(el);
                playObserver.observe(el);
                
                const capIdx = el.dataset.idx;
                const capText = document.getElementById(`cap-${capIdx}`);
                const capBtn = document.getElementById(`cap-btn-${capIdx}`);
                if(capText && capBtn) {
                    setTimeout(() => {
                        if (capText.scrollHeight <= capText.clientHeight) {
                            capBtn.style.display = 'none';
                        }
                    }, 100);
                }
            });

            const target = document.querySelector(`[data-idx="${startIdx}"]`);
            if (target) target.scrollIntoView({ behavior: 'auto', block: 'start' });
            
            const userPfpEl = document.getElementById("c-user-pfp");
            const userDpSrc = document.getElementById("b-pfp-img").src;
            if(userPfpEl && userDpSrc) userPfpEl.src = userDpSrc;
        }

        function toggleCaption(i) {
            const cap = document.getElementById(`cap-${i}`);
            const btn = document.getElementById(`cap-btn-${i}`);
            if (cap.classList.contains('expanded')) {
                cap.classList.remove('expanded');
                btn.innerText = "more";
            } else {
                cap.classList.add('expanded');
                btn.innerText = "less";
            }
        }

        function loadContent(idx) {
            const item = activeFeed[idx];
            const container = document.getElementById(`media-slot-${idx}`);
            
            if (unloadTimeouts[item.id]) {
                clearTimeout(unloadTimeouts[item.id]);
                delete unloadTimeouts[item.id];
            }

            if (!container || container.dataset.loaded === "true") return;

            setTimeout(() => {
                if (unloadTimeouts[item.id]) return; 

                // Added preload="metadata" and proper fallback poster to fix black screen in apps
                let content = item.type === 'reel' ? 
                    (item.videoUrl ? `<video src="${item.videoUrl}" loop playsinline preload="metadata" ${isMuted?'muted':''} poster="${item.thumbnail || ''}" style="width:100%;height:100%;object-fit:contain;background:transparent;"></video>` : `<div class="yt-clip-box"><div id="yt-player-${item.id}"></div></div>`) :
                    `<img src="${item.image}" style="width:100%;height:100%;object-fit:contain;">`;

                // Distinct Play button overlay for paused/blocked states
                container.innerHTML = `<img src="https://cdn-icons-png.flaticon.com/512/0/375.png" class="play-overlay" id="play-btn-${idx}" onclick="forcePlay(${idx}, event)">` + content;
                container.dataset.loaded = "true";

                if (item.ytId) {
                    ytPlayers[item.id] = new YT.Player(`yt-player-${item.id}`, { 
                        videoId: item.ytId, 
                        playerVars: { 'autoplay': 0, 'controls': 0, 'loop': 1, 'playlist': item.ytId, 'rel': 0, 'playsinline': 1 },
                        events: {
                            'onReady': (e) => {
                                if (isMuted) e.target.mute(); else e.target.unMute();
                                const el = document.getElementById(`reel-cont-${item.id}`);
                                if (el && el.getBoundingClientRect().top === 0) e.target.playVideo();
                            }
                        }
                    });
                }
            }, 50);
        }

        function unloadContent(idx) {
            const item = activeFeed[idx];
            const container = document.getElementById(`media-slot-${idx}`);
            if (!container || container.dataset.loaded !== "true") return;

            unloadTimeouts[item.id] = setTimeout(() => {
                if (ytPlayers[item.id]) { try { ytPlayers[item.id].destroy(); } catch(e){} delete ytPlayers[item.id]; }
                
                const vid = container.querySelector('video');
                if (vid) {
                    vid.pause();
                    vid.removeAttribute('src'); 
                    vid.load();
                }

                container.innerHTML = `<div class="loader-ring"></div>`; 
                container.dataset.loaded = "false";
                delete unloadTimeouts[item.id];
            }, 600); 
        }

        // AUTO-PLAY IN-APP BROWSER FIX - Added safe retry loop for instant Grid to Reel play
        function playContent(idx) {
            const item = activeFeed[idx];
            const container = document.getElementById(`media-slot-${idx}`);
            if (!container) return;
            
            window.pendingPlayIdx = idx; // Track the exact reel we want to play
            
            const tryPlay = () => {
                if (window.pendingPlayIdx !== idx) return; // Prevent race conditions if scrolled away quickly
                
                if (container.dataset.loaded !== "true") {
                    setTimeout(tryPlay, 50); // Retry until the video is physically in the DOM
                    return;
                }
                
                document.querySelectorAll('video').forEach(v => {
                    v.pause();
                    v.muted = true;
                });

                const vid = container.querySelector('video');
                const btn = document.getElementById(`play-btn-${idx}`);
                
                if (vid) {
                    vid.currentTime = 0; 
                    vid.muted = isMuted; // Essential for Autoplay to work initially
                    
                    let playPromise = vid.play();
                    if (playPromise !== undefined) {
                        playPromise.then(() => {
                            if(btn) btn.style.display = 'none';
                        }).catch(() => { 
                            // Autoplay blocked completely by in-app browser. Show manual Play Icon!
                            if(btn) btn.style.display = "block";
                            vid.pause();
                        });
                    }
                }
                if (ytPlayers[item.id] && ytPlayers[item.id].playVideo) {
                    if (isMuted) ytPlayers[item.id].mute(); else ytPlayers[item.id].unMute();
                    ytPlayers[item.id].playVideo();
                }
            };
            
            tryPlay();
        }

        // Bypasses auto-play blocks when Play Button is tapped
        function forcePlay(idx, event) {
            event.stopPropagation(); 
            isMuted = false; 
            
            document.querySelectorAll('video').forEach(v => {
                v.pause();
                v.muted = true;
            });
            
            const vid = document.querySelector(`[data-idx="${idx}"] video`);
            if (vid) {
                vid.muted = false;
                vid.play().catch(e => console.log("Manual play failed", e));
            }
            
            const btn = document.getElementById(`play-btn-${idx}`);
            if (btn) btn.style.display = 'none';
        }

        function pauseContent(idx) {
            const item = activeFeed[idx];
            const container = document.getElementById(`media-slot-${idx}`);
            if (!container) return;

            const vid = container.querySelector('video');
            if (vid) { vid.pause(); vid.muted = true; }
            if (ytPlayers[item.id] && ytPlayers[item.id].pauseVideo) ytPlayers[item.id].pauseVideo();
        }

        function handlePlayerTap(i, event) {
            if (!LOG) { document.getElementById("action-modal").style.display = "flex"; return; }
            
            // CAPTION EXPANSION FIX: Collapse without muting
            const cap = document.getElementById(`cap-${i}`);
            if (cap && cap.classList.contains('expanded')) {
                toggleCaption(i);
                return; // Stop right here, don't mute/unmute
            }

            // Normal Mute/Unmute logic
            if (!tapTimer) {
                tapTimer = setTimeout(() => {
                    isMuted = !isMuted;
                    
                    const hint = document.getElementById('vol-hint'), icon = document.getElementById('vol-icon');
                    icon.src = isMuted ? "https://cdn-icons-png.flaticon.com/512/3127/3127501.png" : "https://cdn-icons-png.flaticon.com/512/727/727269.png";
                    hint.style.display = "block";
                    clearTimeout(window.volTimeout);
                    window.volTimeout = setTimeout(() => { hint.style.display = "none"; }, 800);

                    const currentVid = document.querySelector(`[data-idx="${i}"] video`);
                    if(currentVid) currentVid.muted = isMuted;

                    Object.values(ytPlayers).forEach(p => { 
                        if(p && typeof p.isMuted === 'function') {
                            if (isMuted) p.mute(); else p.unMute(); 
                        }
                    });
                    
                    tapTimer = null;
                }, 280);
            } else {
                clearTimeout(tapTimer); tapTimer = null;
                processLike(i, true, event);
            }
        }

        async function processLike(i, force = false, event = null) {
            if (!LOG) { document.getElementById("action-modal").style.display = "flex"; return; }
            const item = activeFeed[i];
            item.likes = item.likes || [];
            const alreadyLiked = item.likes.includes(LOG);

            if (!alreadyLiked || force) {
                if (!item.likes.includes(LOG)) item.likes.push(LOG);
                document.getElementById(`like-icon-${i}`).src = "https://cdn-icons-png.flaticon.com/512/833/833472.png";
                document.getElementById(`like-icon-${i}`).style.filter = "invert(27%) sepia(91%) saturate(7333%) hue-rotate(345deg) brightness(98%) contrast(97%)";
                
                const container = document.getElementById(`reel-cont-${item.id}`);
                
                if (event) {
                    const rect = container.getBoundingClientRect();
                    const x = event.clientX - rect.left;
                    const y = event.clientY - rect.top;
                    
                    const heart = document.createElement("img");
                    heart.src = "https://cdn-icons-png.flaticon.com/512/833/833472.png";
                    heart.className = "animate-heart";
                    heart.style.left = `${x}px`;
                    heart.style.top = `${y}px`;
                    container.appendChild(heart);
                    setTimeout(() => heart.remove(), 800);
                }
                
                for(let k=0; k<8; k++) {
                    const m = document.createElement("img");
                    m.src = "https://cdn-icons-png.flaticon.com/512/833/833472.png";
                    m.className = "mini-heart";
                    if(event) {
                         const rect = container.getBoundingClientRect();
                         m.style.left = (event.clientX - rect.left + (Math.random() * 40 - 20)) + "px";
                         m.style.top = (event.clientY - rect.top + (Math.random() * 40 - 20)) + "px";
                    } else {
                         m.style.left = (Math.random() * 40 + 30) + "%";
                         m.style.top = (Math.random() * 20 + 40) + "%";
                    }
                    container.appendChild(m);
                    setTimeout(() => m.remove(), 800);
                }
            } else {
                item.likes = item.likes.filter(u => u !== LOG);
                document.getElementById(`like-icon-${i}`).src = "https://cdn-icons-png.flaticon.com/512/1077/1077035.png";
                document.getElementById(`like-icon-${i}`).style.filter = "invert(1)";
            }

            document.getElementById(`like-count-${i}`).innerText = item.likes.length;
            await db.collection("users").doc(item.owner).collection(item.type==='reel'?'reels':'posts').doc(item.id).update({likes: item.likes});
        }

        // ==========================
        // INSTAGRAM EXACT COMMENTS LOGIC
        // ==========================
        function openComments(idx) {
            if(!LOG) { checkGuestAction(); return; }
            activeCommentIndex = idx;
            currentReplyToId = null; // reset state
            document.getElementById('c-text-input').value = "";
            document.getElementById('comment-overlay').style.display = 'flex';
            document.getElementById('c-list-box').innerHTML = '<div class="loader-ring" style="position:relative; margin: 20px auto;"></div>';
            loadComments(idx);
        }

        function closeComments(e) {
            if(e.target.id === 'comment-overlay') {
                document.getElementById('comment-overlay').style.display = 'none';
                activeCommentIndex = -1;
                currentReplyToId = null;
            }
        }

        function togglePostBtn() {
            const input = document.getElementById("c-text-input").value.trim();
            const btn = document.getElementById("c-post-btn-action");
            if(input.length > 0) btn.classList.add('active');
            else btn.classList.remove('active');
        }

        function prepareReply(cId, username) {
            currentReplyToId = cId;
            const input = document.getElementById('c-text-input');
            input.value = `@${username} `;
            input.focus();
            togglePostBtn();
        }

        // Fired off to Firestore to save comment likes!
        async function toggleCommentLike(iconEl, cId, rId, rOwner, rType) {
            const isLiked = iconEl.src.includes('1077035');
            const path = rType === 'reel' ? 'reels' : 'posts';
            const ref = db.collection("users").doc(rOwner).collection(path).doc(rId).collection("comments").doc(cId);

            if(isLiked) {
                iconEl.src = "https://cdn-icons-png.flaticon.com/512/833/833472.png";
                iconEl.style.filter = "invert(27%) sepia(91%) saturate(7333%) hue-rotate(345deg) brightness(98%) contrast(97%)";
                await ref.update({ likes: firebase.firestore.FieldValue.arrayUnion(LOG) });
            } else {
                iconEl.src = "https://cdn-icons-png.flaticon.com/512/1077/1077035.png";
                iconEl.style.filter = "invert(0.6)";
                await ref.update({ likes: firebase.firestore.FieldValue.arrayRemove(LOG) });
            }
            
            // Reload silently to refresh the tiny number below the heart
            loadComments(activeCommentIndex);
        }

        function toggleReplies(cId) {
            const box = document.getElementById(`replies-${cId}`);
            if (box.style.display === 'none') box.style.display = 'flex';
            else box.style.display = 'none';
        }

        async function loadComments(idx) {
            const item = activeFeed[idx];
            const list = document.getElementById('c-list-box');
            try {
                const path = item.type === 'reel' ? 'reels' : 'posts';
                const snapshot = await db.collection("users").doc(item.owner).collection(path).doc(item.id).collection("comments").orderBy("timestamp", "asc").get();
                
                if(snapshot.empty) {
                    list.innerHTML = '<p style="text-align:center; color:#8e8e8e; margin-top:30px; font-size: 14px;">No comments yet. Start the conversation.</p>';
                    return;
                }

                let allComments = [];
                snapshot.forEach(doc => allComments.push({id: doc.id, ...doc.data()}));
                
                let mainComments = allComments.filter(c => !c.replyTo);
                let repliesMap = {};
                allComments.filter(c => c.replyTo).forEach(c => {
                    if(!repliesMap[c.replyTo]) repliesMap[c.replyTo] = [];
                    repliesMap[c.replyTo].push(c);
                });

                let html = '';
                
                function generateCommentHtml(c, isReply = false) {
                    const timeAgo = c.timestamp ? calculateTimeAgo(c.timestamp.toDate()) : 'Just now';
                    const userMatch = allUsers.find(u => u.id === c.user);
                    const cPfp = userMatch ? (userMatch.profileImg || DIMG) : DIMG;
                    const pfpSize = isReply ? "28px" : "36px";
                    
                    const isLiked = c.likes && c.likes.includes(LOG);
                    const heartSrc = isLiked ? "https://cdn-icons-png.flaticon.com/512/833/833472.png" : "https://cdn-icons-png.flaticon.com/512/1077/1077035.png";
                    const heartFilter = isLiked ? "invert(27%) sepia(91%) saturate(7333%) hue-rotate(345deg) brightness(98%) contrast(97%)" : "invert(0.6)";
                    
                    return `
                    <div class="c-item" style="${isReply ? 'margin-bottom: 5px;' : ''}">
                        <img src="${cPfp}" class="c-item-pfp" style="width:${pfpSize}; height:${pfpSize};">
                        <div class="c-content">
                            <div class="c-user-time"><span class="c-username">${c.user}</span> <span class="c-time">${timeAgo}</span></div>
                            <div class="c-text">${c.text}</div>
                            <div class="c-actions">
                                <span class="c-reply-btn" onclick="prepareReply('${isReply ? c.replyTo : c.id}', '${c.user}')">Reply</span>
                            </div>
                        </div>
                        <div style="display:flex; flex-direction:column; align-items:center; gap:4px; min-width:24px;">
                            <img src="${heartSrc}" class="c-like-icon" style="filter: ${heartFilter};" onclick="toggleCommentLike(this, '${c.id}', '${item.id}', '${item.owner}', '${item.type}')">
                            ${c.likes && c.likes.length > 0 ? `<span style="font-size:11px; color:#a8a8a8; font-weight:600;">${c.likes.length}</span>` : ''}
                        </div>
                    </div>`;
                }

                mainComments.forEach(c => {
                    html += generateCommentHtml(c, false);
                    if(repliesMap[c.id] && repliesMap[c.id].length > 0) {
                        html += `<div style="margin-left: 48px;">
                                    <div class="c-view-replies" onclick="toggleReplies('${c.id}')">View replies (${repliesMap[c.id].length})</div>
                                    <div class="c-replies-container" id="replies-${c.id}" style="display:none;">`;
                        repliesMap[c.id].forEach(rep => { html += generateCommentHtml(rep, true); });
                        html += `   </div>
                                 </div>`;
                    }
                });
                
                list.innerHTML = html;
            } catch(e) {
                console.error("Error loading comments", e);
                list.innerHTML = '<p style="text-align:center; color:#8e8e8e; margin-top:30px;">Error loading comments</p>';
            }
        }

        async function submitComment() {
            if(activeCommentIndex === -1) return;
            const input = document.getElementById("c-text-input");
            const text = input.value.trim();
            if(!text) return;
            
            // Cancel reply status if user backspaced out the "@username" tag manually
            if(currentReplyToId && !text.startsWith('@')) {
                currentReplyToId = null;
            }
            
            const btn = document.getElementById("c-post-btn-action");
            btn.innerText = "...";
            
            const item = activeFeed[activeCommentIndex];
            const path = item.type === 'reel' ? 'reels' : 'posts';
            const commentRef = db.collection("users").doc(item.owner).collection(path).doc(item.id).collection("comments");
            
            try {
                const commentData = { user: LOG, text: text, timestamp: firebase.firestore.FieldValue.serverTimestamp() };
                if (currentReplyToId) commentData.replyTo = currentReplyToId;

                await commentRef.add(commentData);
                
                const newCount = (item.commentCount || 0) + 1;
                item.commentCount = newCount;
                await db.collection("users").doc(item.owner).collection(path).doc(item.id).update({ commentCount: newCount });
                
                const currentContainer = document.getElementById(`reel-cont-${item.id}`);
                if(currentContainer) {
                    const countSpan = currentContainer.querySelectorAll('.r-act span'); 
                    if(countSpan) countSpan.innerText = newCount;
                }
                
                input.value = "";
                currentReplyToId = null; // reset!
                togglePostBtn();
                loadComments(activeCommentIndex);
            } catch(e) { console.error("Post comment error", e); showToast("Failed to post comment"); }
            finally { btn.innerText = "Post"; }
        }

        function calculateTimeAgo(date) {
            const seconds = Math.floor((new Date() - date) / 1000);
            let interval = seconds / 31536000;
            if (interval > 1) return Math.floor(interval) + "y";
            interval = seconds / 2592000;
            if (interval > 1) return Math.floor(interval) + "mo";
            interval = seconds / 86400;
            if (interval > 1) return Math.floor(interval) + "d";
            interval = seconds / 3600;
            if (interval > 1) return Math.floor(interval) + "h";
            interval = seconds / 60;
            if (interval > 1) return Math.floor(interval) + "m";
            return Math.floor(seconds) + "s";
        }
        // ==========================

        function copyShareLink(i) {
            const item = activeFeed[i];
            const base = window.location.origin + window.location.pathname;
            const link = `${base}?u=${item.owner}&p=${item.id}&t=${item.type}`;
            navigator.clipboard.writeText(link);
            showToast("Link copied to clipboard!");
        }

        function liveSearch(val) {
            const results = document.getElementById("search-results"), grid = document.getElementById("explore-grid"), close = document.getElementById("s-close");
            if (!val) { clearSearch(); return; }
            close.style.display = "block"; grid.style.display = "none"; results.style.display = "block";
            
            const matches = allUsers.filter(u => u.id.toLowerCase().includes(val.toLowerCase()));
            results.innerHTML = matches.map(u => `
                <div class="u-row" onclick="location.href='profile.html?u=${u.id}'">
                    <img src="${u.profileImg || DIMG}">
                    <div class="u-info"><b>${u.id}</b><span>${u.fullName || 'Auragram User'}</span></div>
                </div>`).join('');
        }

        function clearSearch() {
            document.getElementById("s-input").value = "";
            document.getElementById("s-close").style.display = "none";
            document.getElementById("search-results").style.display = "none";
            document.getElementById("explore-grid").style.display = "grid";
        }

        function closePlayer() {
            stopMedia();
            document.getElementById("reel-player-view").style.display = "none";
            
            if(window.location.search) {
                window.history.replaceState({}, document.title, window.location.pathname);
            }
        }

        function openReelsOnly() {
            const reels = exploreFeed.filter(item => item.type === 'reel');
            if(reels.length > 0) openFullFeed(0, reels);
        }

        init();

    </script>
</body>
