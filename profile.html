<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Auragram | Ultimate</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; -webkit-tap-highlight-color:transparent; }
        body { background:#000; color:#fff; overflow-x:hidden; position:relative; height:100%; }
        ::-webkit-scrollbar { display:none; }
        
        /* NAVIGATION */
        nav { height:48px; display:flex; align-items:center; justify-content:space-between; padding:0 12px; position:sticky; top:0; background:#000; z-index:1000; border-bottom:0.1px solid #262626; }
        .nav-c { display:flex; align-items:center; gap:3px; position:absolute; left:50%; transform:translateX(-50%); }
        .nav-c b { font-size:18px; font-weight:900; }
        .dot { width:6px; height:6px; background:#ed4956; border-radius:50%; border:1px solid #000; margin-top:2px; }
        .nav-icon { width:24px; filter:invert(1); }
        
        /* PROFILE HEADER */
        .p-wrap { padding:10px 15px 0; }
        .p-top { display:flex; align-items:center; margin-bottom:12px; }
        .pfp-c { position:relative; width:82px; height:82px; margin-right:20px; flex-shrink:0; }
        .pfp-img { width:82px; height:82px; border-radius:50%; object-fit:cover; border:1px solid #262626; background:#121212; }
        .add-s { position:absolute; bottom:1px; right:1px; background:#0095f6; border-radius:50%; width:22px; height:22px; border:2px solid #000; display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:900; }
        
        .p-stats { display:flex; flex:1; justify-content:space-around; text-align:center; }
        .s-val { font-weight:700; font-size:17px; display:block; }
        .s-lab { font-size:12px; color:#a8a8a8; }
        
        .p-bio { margin-bottom:12px; min-height:20px; }
        .u-bold { font-size:14px; font-weight:700; display:block; }
        .u-text { font-size:14px; color:#efefef; white-space:pre-wrap; display:block; margin-top:1px; }
        .u-link { color:#e0f1ff; font-size:13px; font-weight:500; cursor:pointer; }
        
        .p-btns { display:flex; gap:6px; margin-bottom:15px; }
        .b-sq { background:#262626; border:none; color:#fff; padding:7px; flex:1; border-radius:8px; font-weight:600; font-size:13px; }
        .b-blue { background:#0095f6; border:none; color:#fff; padding:7px; flex:1; border-radius:8px; font-weight:600; font-size:13px; }

        /* POST GRID & TABS */
        .g-nav { display:flex; border-top:0.1px solid #262626; position:sticky; top:48px; background:#000; z-index:900; }
        .g-tab { flex:1; text-align:center; padding:10px; opacity:0.3; transition:0.2s; }
        .g-tab.active { opacity:1; border-bottom:1px solid #fff; }
        .g-tab img { width:22px; filter:invert(1); }
        
        #p-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:1px; background:#000; min-height:100vh; }
        .g-item { aspect-ratio:1/1; background:#121212; position:relative; overflow:hidden; }
        .g-item img { width:100%; height:100%; object-fit:cover; }
        .d-ov { position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(237,73,86,0.9); display:none; align-items:center; justify-content:center; font-size:11px; font-weight:900; color:#fff; }

        /* LIST VIEW & STICKY TABS */
        #l-view { position:fixed; top:0; left:0; width:100vw; height:100vh; background:#000; z-index:3000; display:none; flex-direction:column; }
        .l-head { height:48px; display:flex; align-items:center; padding:0 12px; border-bottom:0.1px solid #262626; background:#000; flex-shrink:0; }
        .l-tabs-s { display:flex; background:#000; border-bottom:0.1px solid #262626; position:sticky; top:0; z-index:10; }
        .lt { flex:1; text-align:center; padding:12px; color:#a8a8a8; font-weight:600; font-size:14px; border-bottom:1px solid transparent; }
        .lt.active { color:#fff; border-bottom:1px solid #fff; }
        
        .l-scroll { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; }
        .u-row { display:flex; align-items:center; padding:10px 12px; }
        .u-row img { width:44px; height:44px; border-radius:50%; object-fit:cover; margin-right:12px; background:#121212; }
        .u-meta { flex:1; }
        .u-meta b { font-size:14px; display:block; }
        .u-meta span { font-size:13px; color:#a8a8a8; }
        .b-sm { background:#363636; color:#fff; border:none; padding:5px 12px; border-radius:6px; font-size:12px; font-weight:600; }
        .x-rem { font-size:18px; color:#a8a8a8; padding:5px; }

        /* OVERLAYS (EDIT/GENDER) */
        #e-view, #g-view { position:fixed; top:0; left:0; width:100vw; height:100vh; background:#000; z-index:4000; display:none; }
        .e-nav { height:48px; display:flex; align-items:center; justify-content:space-between; padding:0 12px; border-bottom:0.1px solid #262626; }
        .e-pfp-s { text-align:center; padding:15px 0; }
        .e-pfp-img { width:70px; height:70px; border-radius:50%; object-fit:cover; background:#121212; }
        .i-grp { border-bottom:0.1px solid #262626; padding:8px 12px; }
        .i-grp label { color:#a8a8a8; font-size:11px; display:block; }
        .i-grp input, .i-grp textarea { width:100%; background:0; border:0; color:#fff; font-size:15px; outline:0; padding-top:2px; }
        .opt-row { display:flex; justify-content:space-between; padding:14px 12px; border-bottom:0.1px solid #262626; font-size:15px; }
        .rad { width:18px; height:18px; border:1.5px solid #444; border-radius:50%; }
        .opt-row.sel .rad { border:5px solid #0095f6; }

        /* BOTTOM NAV */
        .b-bar { position:fixed; bottom:0; width:100%; height:46px; background:#000; border-top:0.1px solid #262626; display:flex; justify-content:space-around; align-items:center; z-index:1000; }
        .b-bar img { width:22px; filter:invert(1); }
        .b-pfp { width:24px; height:24px; border-radius:50%; border:1.5px solid #fff; object-fit:cover; }

        /* SHEETS */
        #sh-ov { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); display:none; z-index:6000; }
        #sh { position:fixed; bottom:-100%; left:0; width:100%; background:#262626; border-radius:12px 12px 0 0; transition:0.3s cubic-bezier(0.17, 0.67, 0.83, 0.67); z-index:6001; padding:10px 0; text-align:center; }
        #sh.up { bottom:0; }
        .sh-opt { padding:14px; font-weight:600; border-bottom:0.1px solid #363636; font-size:14px; }
        .sh-red { color:#ed4956; font-weight:700; }
        .sh-img { width:56px; height:56px; border-radius:50%; margin:15px 0 10px; object-fit:cover; border:1px solid #363636; }
        .sh-txt { padding:0 40px 15px; font-size:13px; color:#a8a8a8; line-height:1.4; }
        
        #toast { position:fixed; bottom:60px; left:50%; transform:translateX(-50%); background:#333; color:#fff; padding:8px 16px; border-radius:4px; display:none; z-index:9999; font-size:12px; }
        #load { position:fixed; top:52px; left:50%; transform:translateX(-50%); background:#0095f6; color:#fff; padding:4px 12px; border-radius:20px; font-size:10px; z-index:7000; display:none; }
    </style>
</head>
<body>

    <div id="load">Processing...</div>
    <div id="toast"></div>

    <div id="main-view">
        <nav>
            <div id="nav-left"></div>
            <div class="nav-c"><b id="h-uid">Auragram</b><div class="dot"></div></div>
            <div id="nav-right"></div>
        </nav>

        <div class="p-wrap">
            <div class="p-top">
                <div class="pfp-c">
                    <img id="m-pfp" src="" class="pfp-img">
                    <div id="add-s-icon" class="add-s" style="display:none;">+</div>
                </div>
                <div class="p-stats">
                    <div class="stat"><span id="c-p" class="s-val">0</span><span class="s-lab">posts</span></div>
                    <div class="stat" onclick="openL('followers')"><span id="c-fer" class="s-val">0</span><span class="s-lab">followers</span></div>
                    <div class="stat" onclick="openL('following')"><span id="c-fing" class="s-val">0</span><span class="s-lab">following</span></div>
                </div>
            </div>
            <div class="p-bio">
                <span id="m-name" class="u-bold"></span>
                <span id="m-bio" class="u-text"></span>
                <div id="m-prompt" class="u-link" onclick="openE()" style="display:none;">Add name and bio</div>
            </div>
            <div id="m-act" class="p-btns"></div>
        </div>

        <div class="g-nav">
            <div class="g-tab active"><img src="https://cdn-icons-png.flaticon.com/512/6245/6245413.png"></div>
            <div class="g-tab"><img src="https://cdn-icons-png.flaticon.com/512/1077/1077063.png"></div>
        </div>
        <div id="p-grid"></div>

        <div class="b-bar">
            <img src="https://cdn-icons-png.flaticon.com/512/1946/1946436.png" onclick="location.href='index.html'">
            <img src="https://cdn-icons-png.flaticon.com/512/122/122635.png">
            <img src="https://cdn-icons-png.flaticon.com/512/3161/3161837.png" onclick="trigP()">
            <img src="https://cdn-icons-png.flaticon.com/512/622/622669.png" onclick="location.href='page.html'">
            <img id="b-pfp-img" src="" class="b-pfp" onclick="goHome()">
        </div>
    </div>

    <div id="l-view">
        <div class="l-head">
            <img src="https://cdn-icons-png.flaticon.com/512/271/271218.png" style="width:16px; filter:invert(1);" onclick="closeL()">
            <b id="l-uid" style="margin-left:25px; font-size:15px;"></b>
        </div>
        <div class="l-scroll">
            <div class="l-tabs-s">
                <div id="lt-fer" class="lt" onclick="sw('followers')">Followers</div>
                <div id="lt-fing" class="lt" onclick="sw('following')">Following</div>
            </div>
            <div id="l-cont"></div>
            <div id="s-hd" style="padding:15px; font-weight:700; border-top:0.1px solid #262626; display:none;">Suggested for you</div>
            <div id="l-sug"></div>
        </div>
    </div>

    <div id="e-view">
        <div class="e-nav">
            <span onclick="closeE()">Cancel</span>
            <b style="font-size:15px;">Edit profile</b>
            <span style="color:#0095f6; font-weight:700;" onclick="saveE()">Done</span>
        </div>
        <div class="e-pfp-s">
            <img id="e-pfp" src="" class="e-pfp-img">
            <div style="color:#0095f6; font-weight:700; margin-top:8px; font-size:13px;" onclick="openSh('pfp')">Change profile photo</div>
        </div>
        <div class="i-grp"><label>Name</label><input type="text" id="i-n"></div>
        <div class="i-grp"><label>Username</label><input type="text" id="i-u" disabled></div>
        <div class="i-grp"><label>Bio</label><textarea id="i-b" rows="2"></textarea></div>
        <div class="opt-row" onclick="openG()" style="border-top:0.1px solid #262626;">
            <span>Gender</span>
            <span id="g-l" style="color:#a8a8a8;">Not specified ></span>
        </div>
    </div>

    <div id="g-view">
        <div class="e-nav"><span onclick="closeG()">✕</span><b>Gender</b><span style="color:#0095f6; font-weight:700;" onclick="closeG()">Done</span></div>
        <div id="g-list" style="padding-top:10px;">
            <div class="opt-row" onclick="setG('Female')"><span>Female</span><div class="rad"></div></div>
            <div class="opt-row" onclick="setG('Male')"><span>Male</span><div class="rad"></div></div>
            <div class="opt-row" onclick="setG('Custom')"><span>Custom</span><div class="rad"></div></div>
            <div class="opt-row" onclick="setG('Prefer not to say')"><span>Prefer not to say</span><div class="rad"></div></div>
        </div>
    </div>

    <div id="sh-ov" onclick="closeSh()"></div>
    <div id="sh"></div>

    <input type="file" id="f-img" hidden accept="image/*" onchange="upPfp(event)">
    <input type="file" id="f-pst" hidden accept="image/*" onchange="upPst(event)">

    <script>
        const LOG = localStorage.getItem('loggedUser');
        const config = { apiKey: "AIzaSyAHjilh7jAlS0e5qDKxbDZq3nbe3pFe4nE", authDomain: "instagram-e8c7a.firebaseapp.com", projectId: "instagram-e8c7a", storageBucket: "instagram-e8c7a.firebasestorage.app", messagingSenderId: "270990839800", appId: "1:270990839800:web:7f56ea2ea8d941219fd00d" };
        firebase.initializeApp(config);
        const db = firebase.firestore();
        const DIMG = "https://www.w3schools.com/howto/img_avatar.png";
        
        let VIEW = LOG;
        let curG = "";
        let timer;

        async function init() {
            if(!LOG) { location.href='index.html'; return; }
            const p = new URLSearchParams(location.search);
            if(p.get('u')) VIEW = p.get('u');
            render();
        }

        async function render() {
            const s = await db.collection('users').doc(VIEW).get();
            if(!s.exists) return;
            const d = s.data();
            const isMe = (VIEW === LOG);

            // NAV LOGIC: Back button vs Plus button
            const nLeft = document.getElementById('nav-left');
            const nRight = document.getElementById('nav-right');
            if(isMe) {
                nLeft.innerHTML = `<span style="font-size:26px;" onclick="trigP()">+</span>`;
                nRight.innerHTML = `<img src="https://cdn-icons-png.flaticon.com/512/151/151917.png" class="nav-icon" onclick="exit()">`;
                document.getElementById('add-s-icon').style.display = 'flex';
            } else {
                nLeft.innerHTML = ``;
                nRight.innerHTML = `<img src="https://cdn-icons-png.flaticon.com/512/271/271218.png" style="width:18px; filter:invert(1); transform:scaleX(-1);" onclick="goHome()">`;
                document.getElementById('add-s-icon').style.display = 'none';
            }

            document.getElementById('h-uid').innerText = VIEW;
            document.getElementById('m-pfp').src = d.profileImg || DIMG;
            document.getElementById('m-name').innerText = d.name || "";
            document.getElementById('m-bio').innerText = d.bio || "";
            document.getElementById('b-pfp-img').src = localStorage.getItem('myPfp') || d.profileImg || DIMG;
            
            document.getElementById('c-fer').innerText = (d.followerList || []).length;
            document.getElementById('c-fing').innerText = (d.followingList || []).length;
            document.getElementById('m-prompt').style.display = (isMe && !d.bio) ? 'block' : 'none';

            const acts = document.getElementById('m-act');
            if(isMe) {
                acts.innerHTML = `<button class="b-sq" onclick="openE()">Edit profile</button><button class="b-sq" onclick="copy()">Share profile</button>`;
                localStorage.setItem('myPfp', d.profileImg || DIMG);
            } else {
                const meS = await db.collection('users').doc(LOG).get();
                const isF = (meS.data().followingList || []).includes(VIEW);
                acts.innerHTML = `<button class="${isF?'b-sq':'b-blue'}" onclick="${isF ? `openSh('unfollow','${VIEW}','${d.profileImg||DIMG}')` : `fol('${VIEW}')`}">${isF ? 'Unfollow' : 'Follow'}</button><button class="b-sq">Message</button>`;
            }

            const psts = await db.collection('users').doc(VIEW).collection('posts').orderBy('timestamp','desc').get();
            const grid = document.getElementById('p-grid'); grid.innerHTML = "";
            psts.forEach(doc => {
                const pd = doc.data();
                grid.innerHTML += `<div class="g-item">
                    <img src="${pd.image}" ontouchstart="sD('${doc.id}')" ontouchend="eD()">
                    ${isMe ? `<div id="d-${doc.id}" class="d-ov" onclick="delP('${doc.id}')">DELETE</div>` : ''}
                </div>`;
            });
            document.getElementById('c-p').innerText = psts.size;
        }

        async function comp(src, q=0.7, max=1000) {
            document.getElementById('load').style.display = 'block';
            return new Promise(r => {
                const i = new Image(); i.src = src;
                i.onload = () => {
                    const cv = document.createElement('canvas');
                    let w = i.width, h = i.height;
                    if(w > max) { h = (max/w)*h; w = max; }
                    cv.width = w; cv.height = h;
                    cv.getContext('2d').drawImage(i,0,0,w,h);
                    document.getElementById('load').style.display = 'none';
                    r(cv.toDataURL('image/jpeg', q));
                }
            });
        }

        function openL(t) { document.getElementById('l-view').style.display = 'flex'; document.getElementById('l-uid').innerText = VIEW; sw(t); }
        async function sw(t) {
            document.getElementById('lt-fer').className = t==='followers'?'lt active':'lt';
            document.getElementById('lt-fing').className = t==='following'?'lt active':'lt';
            const c = document.getElementById('l-cont'); c.innerHTML = "<p style='padding:20px; color:#555;'>Loading...</p>";
            const s = await db.collection('users').doc(VIEW).get();
            const l = (t==='followers' ? s.data().followerList : s.data().followingList) || [];
            if(l.length === 0) c.innerHTML = `<div style='text-align:center; padding:50px; color:#8e8e8e;'>No ${t} yet</div>`;
            else {
                let h = "";
                for(let u of l) {
                    const us = await db.collection('users').doc(u).get(); const ud = us.data();
                    h += `<div class="u-row">
                        <img src="${ud.profileImg||DIMG}" onclick="location.href='?u=${u}'">
                        <div class="u-meta" onclick="location.href='?u=${u}'"><b>${u}</b><span>${ud.name||''}</span></div>
                        ${VIEW===LOG ? `<span class="x-rem" onclick="openSh('rem','${u}','${ud.profileImg||DIMG}')">✕</span>` : ''}
                    </div>`;
                }
                c.innerHTML = h;
            }
            if(VIEW===LOG) loadS(s.data().followingList || []);
        }

        async function loadS(fing) {
            const all = await db.collection('users').limit(10).get();
            const sug = document.getElementById('l-sug'); sug.innerHTML = "";
            let f = false;
            all.forEach(doc => {
                if(doc.id !== LOG && !fing.includes(doc.id)) {
                    f = true;
                    sug.innerHTML += `<div class="u-row">
                        <img src="${doc.data().profileImg||DIMG}" onclick="location.href='?u=${doc.id}'">
                        <div class="u-meta" onclick="location.href='?u=${doc.id}'"><b>${doc.id}</b><span>Suggested</span></div>
                        <button class="b-sm" style="background:#0095f6" onclick="fol('${doc.id}')">Follow</button>
                    </div>`;
                }
            });
            document.getElementById('s-hd').style.display = f ? 'block' : 'none';
        }

        async function fol(t) {
            await db.collection('users').doc(LOG).update({ followingList: firebase.firestore.FieldValue.arrayUnion(t) });
            await db.collection('users').doc(t).update({ followerList: firebase.firestore.FieldValue.arrayUnion(LOG) });
            render(); if(document.getElementById('l-view').style.display==='flex') sw('following');
        }

        function openSh(m, t, img) {
            const s = document.getElementById('sh');
            if(m==='pfp') s.innerHTML = `<div class="sh-opt" onclick="document.getElementById('f-img').click()">New Profile Photo</div><div class="sh-opt sh-red" onclick="closeSh()">Cancel</div>`;
            else if(m==='rem' || m==='unfollow') {
                const txt = m==='rem' ? `Remove follower?` : `Unfollow @${t}?`;
                const act = m==='rem' ? `remF('${t}')` : `unfol('${t}')`;
                s.innerHTML = `<img src="${img}" class="sh-img"><b>${txt}</b><div class="sh-txt">You can always follow them back later.</div><div class="sh-opt sh-red" onclick="${act}">${m==='rem'?'Remove':'Unfollow'}</div><div class="sh-opt" onclick="closeSh()">Cancel</div>`;
            }
            document.getElementById('sh-ov').style.display = 'block';
            setTimeout(() => s.classList.add('up'), 10);
        }

        async function unfol(t) {
            await db.collection('users').doc(LOG).update({ followingList: firebase.firestore.FieldValue.arrayRemove(t) });
            await db.collection('users').doc(t).update({ followerList: firebase.firestore.FieldValue.arrayRemove(LOG) });
            closeSh(); render();
        }

        async function remF(t) {
            await db.collection('users').doc(LOG).update({ followerList: firebase.firestore.FieldValue.arrayRemove(t) });
            await db.collection('users').doc(t).update({ followingList: firebase.firestore.FieldValue.arrayRemove(LOG) });
            closeSh(); render(); sw('followers');
        }

        function openE() {
            db.collection('users').doc(LOG).get().then(s => {
                const d = s.data(); document.getElementById('i-n').value = d.name || ""; document.getElementById('i-u').value = LOG;
                document.getElementById('i-b').value = d.bio || ""; document.getElementById('e-pfp').src = d.profileImg || DIMG;
                document.getElementById('g-l').innerText = (d.gender || "Not specified") + " >"; curG = d.gender || "";
                document.getElementById('e-view').style.display = 'block';
            });
        }

        async function saveE() { await db.collection('users').doc(LOG).update({ name: document.getElementById('i-n').value, bio: document.getElementById('i-b').value, gender: curG }); closeE(); render(); }
        async function upPfp(e) { const f = e.target.files[0]; if(f) { const r = new FileReader(); r.onload = async (ev) => { const d = await comp(ev.target.result, 0.6, 300); await db.collection('users').doc(LOG).update({ profileImg: d }); closeSh(); render(); document.getElementById('e-pfp').src = d; }; r.readAsDataURL(f); } }
        function trigP() { document.getElementById('f-pst').click(); }
        async function upPst(e) { const f = e.target.files[0]; if(f) { const r = new FileReader(); r.onload = async (ev) => { const d = await comp(ev.target.result, 0.8, 1080); const c = prompt("Caption?"); await db.collection('users').doc(LOG).collection('posts').add({ image: d, caption: c, timestamp: firebase.firestore.FieldValue.serverTimestamp() }); render(); }; r.readAsDataURL(f); } }
        
        function sD(id) { timer = setTimeout(() => { if(document.getElementById('d-'+id)) document.getElementById('d-'+id).style.display = 'flex'; }, 700); }
        function eD() { clearTimeout(timer); }
        async function delP(id) { if(confirm("Delete?")) { await db.collection('users').doc(LOG).collection('posts').doc(id).delete(); render(); } }
        
        function copy() { navigator.clipboard.writeText(location.origin + location.pathname + "?u=" + VIEW); const t = document.getElementById('toast'); t.innerText = "Link copied"; t.style.display = 'block'; setTimeout(() => t.style.display='none', 2000); }
        function setG(v) { curG = v; document.querySelectorAll('.opt-row').forEach(el => el.classList.remove('sel')); event.currentTarget.classList.add('sel'); document.getElementById('g-l').innerText = v + " >"; }
        function closeE() { document.getElementById('e-view').style.display = 'none'; }
        function closeL() { document.getElementById('l-view').style.display = 'none'; }
        function closeSh() { document.getElementById('sh').classList.remove('up'); setTimeout(()=>document.getElementById('sh-ov').style.display='none', 300); }
        function openG() { document.getElementById('g-view').style.display = 'block'; }
        function closeG() { document.getElementById('g-view').style.display = 'none'; }
        function goHome() { location.href = "profile.html"; }
        function exit() { localStorage.clear(); location.href = "index.html"; }

        init();
    </script>
</body>
